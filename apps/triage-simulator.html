<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Triage Simulator - Woven Learning Mini Med School</title>
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.9/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #F0F4F8;
      min-height: 100vh;
      padding: 0;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-12px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.7; }
    }
    @keyframes urgentPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(192, 57, 43, 0); }
      50% { box-shadow: 0 0 0 6px rgba(192, 57, 43, 0.15); }
    }
    @keyframes timerPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }
    @keyframes correctReveal {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes dispatchBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .fade-in { animation: fadeIn 0.4s ease-out; }
    .slide-in { animation: slideIn 0.4s ease-out; }
    .slide-up { animation: slideUp 0.5s ease-out; }
    .pulse { animation: pulse 1s ease-in-out infinite; }
    .urgent-pulse { animation: urgentPulse 1s ease-in-out infinite; }
    .timer-pulse { animation: timerPulse 0.6s ease-in-out infinite; }
    .correct-reveal { animation: correctReveal 0.4s ease-out; }
    .dispatch-blink { animation: dispatchBlink 1.2s ease-in-out infinite; }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // Color scheme
    const NAVY = "#1B3A5C";
    const TEAL = "#2A9D8F";
    const TEAL_DARK = "#1A6B6B";
    const GOLD = "#D4A843";
    const LIGHT_BG = "#F0F4F8";
    const RED = "#C0392B";
    const GREEN = "#27AE60";
    const YELLOW = "#F39C12";
    const DARK = "#333333";
    const MED = "#666666";
    const WHITE = "#FFFFFF";

    // Triage categories with colors
    const TRIAGE_CATS = {
      RED: { label: "RED - Immediate", color: RED, bgColor: "#FADBD8", priority: 0, desc: "Life-threatening", icon: "\u26a0\ufe0f" },
      YELLOW: { label: "YELLOW - Delayed", color: YELLOW, bgColor: "#FFF9E6", priority: 1, desc: "Urgent but stable", icon: "\u23f3" },
      GREEN: { label: "GREEN - Minor", color: GREEN, bgColor: "#E8F8F1", priority: 2, desc: "Walking wounded", icon: "\u2705" },
      BLACK: { label: "BLACK - Expectant", color: "#555", bgColor: "#E8E8E8", priority: 3, desc: "Comfort care", icon: "\ud83d\udda4" }
    };

    const scenarios = [
      {
        id: "highway",
        title: "Highway Pileup",
        icon: "\ud83d\ude91",
        setting: "15-car collision on I-95. You're the incident commander. EMS arrives with 8 patients within 5 minutes.",
        dispatch: "DISPATCH: Multi-vehicle collision reported on I-95 northbound, mile marker 42. Callers report at least 15 vehicles involved. Multiple injuries, possible entrapment. Fire and EMS en route. You are designated Incident Commander for triage.",
        description: "Multi-vehicle collision with mixed injuries",
        timeLimit: 120,
        patients: [
          {
            id: "A", name: "Driver (Car 1)", age: 45,
            desc: "Unconscious, unresponsive to pain. Severe head trauma, exposed brain matter. Barely breathing.",
            vitals: { bp: "70/45", pulse: 140, spo2: 78, temp: "96.2\u00b0F" },
            symptoms: ["Unresponsive", "Head trauma", "Severe blood loss", "Agonal breathing"],
            correctTriage: "BLACK",
            reasoning: "Catastrophic head injury with exposed brain matter and agonal breathing indicates unsurvivable injury. In a mass casualty event with limited resources, this patient receives expectant (comfort) care to allow resources to be directed toward salvageable patients."
          },
          {
            id: "B", name: "Passenger (Car 1)", age: 42,
            desc: "Chest trauma, breathing only 6/min, cyanotic. Likely tension pneumothorax.",
            vitals: { bp: "88/60", pulse: 135, spo2: 82, temp: "98.1\u00b0F" },
            symptoms: ["Severe dyspnea", "Cyanosis", "Chest pain", "Hypotension"],
            correctTriage: "RED",
            reasoning: "Tension pneumothorax is immediately life-threatening but highly treatable with needle decompression. Classic presentation: cyanosis, hypotension, tachycardia, and respiratory rate of only 6/min. Without immediate intervention, this patient will die within minutes."
          },
          {
            id: "C", name: "SUV Driver", age: 38,
            desc: "Alert, abdominal pain, bruising. Bleeding from lacerated spleen likely. Pale, sweaty.",
            vitals: { bp: "102/68", pulse: 118, spo2: 97, temp: "98.8\u00b0F" },
            symptoms: ["Abdominal trauma", "Tachycardia", "Hypotension trending", "Diaphoretic"],
            correctTriage: "YELLOW",
            reasoning: "Probable intra-abdominal bleeding from splenic laceration. Currently compensating (alert, adequate SpO2) but the tachycardia and diaphoresis suggest ongoing hemorrhage. Needs rapid transport to OR but can tolerate a short delay while RED patients are stabilized."
          },
          {
            id: "D", name: "Truck Driver", age: 52,
            desc: "Conscious, calm. Arm fracture, significant bleeding from arm laceration.",
            vitals: { bp: "140/82", pulse: 96, spo2: 99, temp: "98.4\u00b0F" },
            symptoms: ["Arm fracture", "Controlled bleeding", "Alert", "Good vitals"],
            correctTriage: "GREEN",
            reasoning: "Stable vitals, alert and oriented, bleeding is controllable with direct pressure. Isolated extremity fracture without vascular compromise. This patient can wait for treatment after higher-priority patients are managed."
          },
          {
            id: "E", name: "Backseat Child", age: 8,
            desc: "Conscious, frightened but alert. Minor leg laceration. Good cap refill.",
            vitals: { bp: "106/64", pulse: 102, spo2: 99, temp: "98.6\u00b0F" },
            symptoms: ["Minor laceration", "Frightened", "Normal vitals", "Good perfusion"],
            correctTriage: "GREEN",
            reasoning: "Pediatric patient but hemodynamically stable with excellent perfusion. Minor laceration only. The elevated heart rate is likely fear-related rather than pathological. Monitor but low triage priority."
          },
          {
            id: "F", name: "Motorcyclist", age: 28,
            desc: "Severe leg fracture, femur likely broken. Heavy bleeding from wound.",
            vitals: { bp: "94/58", pulse: 126, spo2: 96, temp: "98.2\u00b0F" },
            symptoms: ["Femur fracture", "Massive bleeding", "Hypotension", "Tachycardia"],
            correctTriage: "RED",
            reasoning: "Femur fractures can cause 1-2 liters of blood loss into the thigh compartment alone. This patient is already showing signs of hemorrhagic shock (hypotension, tachycardia). Without immediate hemorrhage control and fluid resuscitation, this is life-threatening."
          },
          {
            id: "G", name: "Elderly Passenger", age: 72,
            desc: "Stable but confused. Chest pain, history of MI. Breath sounds diminished.",
            vitals: { bp: "148/92", pulse: 88, spo2: 92, temp: "98.5\u00b0F" },
            symptoms: ["Chest pain", "Confusion", "Breath sounds down", "Low SpO2"],
            correctTriage: "YELLOW",
            reasoning: "Elderly patient with cardiac history presenting with chest pain, confusion, and hypoxia. Could be acute MI, hemothorax, or pulmonary contusion. Stable enough to delay briefly but at high risk for rapid deterioration given age and comorbidities."
          },
          {
            id: "H", name: "Bystander", age: 35,
            desc: "Minor abrasions, anxiety attack. Vitals stable, hyperventilating.",
            vitals: { bp: "132/78", pulse: 110, spo2: 99, temp: "98.6\u00b0F" },
            symptoms: ["Anxiety", "Hyperventilation", "Stable vitals", "Psychological trauma"],
            correctTriage: "GREEN",
            reasoning: "Psychological distress without physical injury. Tachycardia and hyperventilation are anxiety-driven, not pathological. Reassurance and calm environment needed, but this patient is medically stable and lowest priority in a mass casualty event."
          }
        ]
      },
      {
        id: "building",
        title: "Building Collapse",
        icon: "\ud83c\udfe2",
        setting: "Partial collapse of 4-story office building. Estimated 15+ injured. 6 patients extricated so far.",
        dispatch: "DISPATCH: Structural collapse at 200 Commerce Drive. Four-story office building, east wing has pancaked. Search and rescue teams extracting survivors. You are assigned triage officer for extricated patients. Expect crush injuries and dust inhalation.",
        description: "Structural disaster with crush injuries and entrapment",
        timeLimit: 180,
        patients: [
          {
            id: "A", name: "Manager (2nd Floor)", age: 55,
            desc: "Pinned under desk for 3 hours. Severe crush injury to legs. Dark urine (rhabdo).",
            vitals: { bp: "110/72", pulse: 104, spo2: 98, temp: "97.1\u00b0F" },
            symptoms: ["Crush injury", "Rhabdomyolysis", "Dark urine", "Compartment syndrome risk"],
            correctTriage: "RED",
            reasoning: "Crush syndrome with rhabdomyolysis is a medical emergency. The dark urine indicates myoglobin release that will cause acute kidney injury without aggressive IV fluid resuscitation. Paradoxically, this patient may look stable but is at imminent risk of fatal cardiac arrhythmia from hyperkalemia upon release."
          },
          {
            id: "B", name: "Security Guard", age: 48,
            desc: "Buried in rubble, extricated 30 min ago. Severe head trauma, periods of unconsciousness.",
            vitals: { bp: "128/82", pulse: 82, spo2: 95, temp: "98.3\u00b0F" },
            symptoms: ["Head trauma", "Altered mental status", "On/off consciousness", "Epidural hematoma?"],
            correctTriage: "YELLOW",
            reasoning: "Fluctuating consciousness with a 'lucid interval' pattern is classic for epidural hematoma. Currently stable but at high risk for rapid deterioration as the hematoma expands. Needs neurosurgical evaluation urgently but can tolerate brief delay."
          },
          {
            id: "C", name: "Receptionist", age: 29,
            desc: "Multiple lacerations, impaled object in left thigh. Bright blood spurting. Alert but pale.",
            vitals: { bp: "98/65", pulse: 132, spo2: 97, temp: "98.4\u00b0F" },
            symptoms: ["Arterial bleeding", "Impaled object", "Hypotension", "Tachycardia"],
            correctTriage: "RED",
            reasoning: "Bright red spurting blood indicates arterial hemorrhage, likely femoral artery given thigh location. Critical rule: never remove an impaled object in the field as it may be tamponading the vessel. This patient needs immediate surgical intervention and will exsanguinate without it."
          },
          {
            id: "D", name: "Intern", age: 22,
            desc: "Minor injuries, scraped up. Alert, walking around, helping others.",
            vitals: { bp: "118/74", pulse: 88, spo2: 99, temp: "98.6\u00b0F" },
            symptoms: ["Minor abrasions", "Alert", "Stable vitals", "Able to assist"],
            correctTriage: "GREEN",
            reasoning: "Classic 'walking wounded' \u2014 ambulatory, alert, stable vitals, minor injuries only. Can actually be recruited to assist with other patients. Lowest triage priority."
          },
          {
            id: "E", name: "Accountant", age: 58,
            desc: "Crushed under beam for 2+ hours. Lower extremities unresponsive. No pulse in foot.",
            vitals: { bp: "95/60", pulse: 130, spo2: 94, temp: "96.8\u00b0F" },
            symptoms: ["Crush injury", "Limb death", "Profound shock", "Hypotension"],
            correctTriage: "BLACK",
            reasoning: "Bilateral lower extremity crush with absent distal pulses and prolonged entrapment indicates limb death with massive tissue destruction. Combined with hemorrhagic shock (hypotension, tachycardia, hypothermia), survival would require resources disproportionate to the mass casualty setting. Expectant care."
          },
          {
            id: "F", name: "Maintenance Worker", age: 61,
            desc: "Stable, alert. Fractured ribs, respiratory compromise. Breath sounds diminished bilaterally.",
            vitals: { bp: "142/88", pulse: 96, spo2: 91, temp: "98.7\u00b0F" },
            symptoms: ["Rib fractures", "Low SpO2", "Respiratory compromise", "Risk of pneumonia"],
            correctTriage: "YELLOW",
            reasoning: "Multiple rib fractures with bilateral diminished breath sounds and SpO2 of 91% indicate significant pulmonary contusion or early flail chest. Currently compensating but at high risk for respiratory failure, especially with dust inhalation from the collapse. Needs close monitoring and supplemental O2."
          }
        ]
      },
      {
        id: "school",
        title: "School Shooting",
        icon: "\ud83c\udfe5",
        setting: "Active shooter at high school. Police secure scene. 7 patients identified for triage.",
        dispatch: "DISPATCH: Shots fired at Lincoln High School. Police report scene is SECURE, shooter is in custody. Multiple gunshot victims reported across three locations: hallway, classroom, and gymnasium. You are lead triage officer. Expect penetrating trauma.",
        description: "Mass casualty violence event",
        timeLimit: 150,
        patients: [
          {
            id: "A", name: "Student (Hallway)", age: 16,
            desc: "Gunshot wound to chest, left side. No breath sounds on left. Collapsed lung.",
            vitals: { bp: "105/70", pulse: 120, spo2: 89, temp: "98.2\u00b0F" },
            symptoms: ["GSW chest", "Pneumothorax", "Hypoxia", "Tachycardia"],
            correctTriage: "RED",
            reasoning: "Penetrating chest trauma with absent breath sounds and SpO2 of 89% indicates pneumothorax (possibly tension). Needle decompression or chest tube is a life-saving intervention that can be performed in the field. Without it, the mediastinum shifts, compresses the heart, and the patient dies."
          },
          {
            id: "B", name: "Student (Classroom)", age: 17,
            desc: "Gunshot wound to abdomen. Stable vitals but guarding. Alert and oriented.",
            vitals: { bp: "132/80", pulse: 104, spo2: 99, temp: "98.5\u00b0F" },
            symptoms: ["GSW abdomen", "Guarding", "Stable now", "Likely intra-abdominal bleed"],
            correctTriage: "YELLOW",
            reasoning: "Penetrating abdominal trauma requires surgical exploration but this patient is currently hemodynamically stable. The guarding suggests peritoneal irritation from blood or bowel contents. Needs OR urgently but can tolerate the brief delay required to stabilize RED patients first."
          },
          {
            id: "C", name: "Student (Cafeteria)", age: 15,
            desc: "Grazing wound to arm. Minor bleeding. Scared but alert. Excellent vitals.",
            vitals: { bp: "118/76", pulse: 92, spo2: 99, temp: "98.6\u00b0F" },
            symptoms: ["Grazing wound", "Minor bleeding", "Alert", "Good vitals"],
            correctTriage: "GREEN",
            reasoning: "Superficial grazing wound with no vascular compromise. Hemodynamically stable. Needs wound care and psychological support but is not in any medical danger. Can wait for treatment."
          },
          {
            id: "D", name: "Teacher", age: 42,
            desc: "Gunshot to head. Unresponsive, pupils fixed and dilated. Massive head trauma.",
            vitals: { bp: "72/48", pulse: 48, spo2: 85, temp: "96.1\u00b0F" },
            symptoms: ["GSW head", "Fixed dilated pupils", "Profound shock", "Brainstem death likely"],
            correctTriage: "BLACK",
            reasoning: "Fixed, dilated pupils with penetrating head trauma and Cushing's triad (hypertension would normally be present but the bradycardia and irregular respirations suggest brainstem herniation). This wound pattern is unsurvivable. Expectant care allows resources for salvageable patients."
          },
          {
            id: "E", name: "Security Officer", age: 52,
            desc: "Gunshot wound to leg. Bright red spurting blood. High tourniquet applied by police.",
            vitals: { bp: "108/66", pulse: 115, spo2: 99, temp: "98.4\u00b0F" },
            symptoms: ["GSW leg", "Arterial bleeding", "Tourniquet in place", "Salvageable"],
            correctTriage: "YELLOW",
            reasoning: "Arterial hemorrhage from GSW to leg, but the tourniquet is controlling the bleeding effectively (SpO2 99%, BP adequate). This buys time. The patient needs surgical repair but the tourniquet can safely remain for 2+ hours. Monitor for tourniquet failure but currently stable."
          },
          {
            id: "F", name: "Student (Gym)", age: 14,
            desc: "Gunshot to shoulder. Pain but stable. Good distal pulse and cap refill.",
            vitals: { bp: "124/78", pulse: 98, spo2: 99, temp: "98.3\u00b0F" },
            symptoms: ["GSW shoulder", "Pain", "Stable vitals", "Distal perfusion intact"],
            correctTriage: "YELLOW",
            reasoning: "Penetrating shoulder wound but with intact distal perfusion (good pulses, capillary refill). No major vascular injury evident. Needs surgical evaluation for possible bone/nerve damage but hemodynamically stable. Can be delayed while RED patients are treated."
          },
          {
            id: "G", name: "Student (Hidden)", age: 16,
            desc: "No physical injury. Severe panic attack, hyperventilating, chest pain from anxiety.",
            vitals: { bp: "138/82", pulse: 128, spo2: 99, temp: "98.7\u00b0F" },
            symptoms: ["Psychological trauma", "Panic attack", "Hyperventilation", "Stable vitals"],
            correctTriage: "GREEN",
            reasoning: "Pure psychological trauma without physical injury. The tachycardia, hypertension, and hyperventilation are all anxiety-driven. SpO2 is 99% confirming adequate oxygenation despite respiratory pattern. Needs psychological first aid but is medically stable."
          }
        ]
      }
    ];

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${mins}:${String(secs).padStart(2, "0")}`;
    }

    // Woven 4-diamond logo SVG component
    function WovenLogo({ size = 20 }) {
      return (
        <svg viewBox="0 0 40 40" width={size} height={size}>
          <polygon points="13,2 24,13 13,24 2,13" fill="#0ABAB5" opacity="0.85"/>
          <polygon points="27,2 38,13 27,24 16,13" fill="#F5B731" opacity="0.85"/>
          <polygon points="13,16 24,27 13,38 2,27" fill="#E65C3C" opacity="0.85"/>
          <polygon points="27,16 38,27 27,38 16,27" fill="#7A2D4E" opacity="0.85"/>
        </svg>
      );
    }

    // Header component
    function AppHeader() {
      return (
        <div style={{
          background: "linear-gradient(135deg, #1B3A5C 0%, #2A9D8F 100%)",
          padding: "10px 16px",
          display: "flex",
          alignItems: "center",
          gap: 10,
          borderBottom: "3px solid #D4A843",
          position: "sticky",
          top: 0,
          zIndex: 100
        }}>
          <WovenLogo size={22} />
          <div>
            <div style={{
              fontSize: 14,
              fontWeight: 800,
              color: WHITE,
              letterSpacing: 0.5,
              lineHeight: 1.2
            }}>
              Mini Med School
            </div>
            <div style={{
              fontSize: 10,
              color: "rgba(255,255,255,0.75)",
              fontWeight: 500,
              letterSpacing: 0.3
            }}>
              Triage Simulator
            </div>
          </div>
        </div>
      );
    }

    // Footer component
    function AppFooter() {
      return (
        <div style={{
          textAlign: "center",
          padding: "12px 16px",
          borderTop: "3px solid #D4A843",
          background: WHITE,
          fontSize: 11,
          color: "#999",
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          gap: 6,
          fontFamily: "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif"
        }}>
          <WovenLogo size={14} />
          Built by <strong style={{ color: TEAL_DARK }}>Woven Learning & Technology</strong>
        </div>
      );
    }

    // Vital sign badge component
    function VitalBadge({ label, value, status }) {
      const colors = {
        critical: { bg: "#FADBD8", color: RED, border: RED },
        warning: { bg: "#FFF3CD", color: "#856404", border: YELLOW },
        normal: { bg: "#E8F8F1", color: GREEN, border: GREEN }
      };
      const c = colors[status] || colors.normal;
      return (
        <div style={{
          display: "flex",
          flexDirection: "column",
          alignItems: "center",
          padding: "4px 10px",
          borderRadius: 8,
          background: c.bg,
          border: `1.5px solid ${c.border}22`,
          minWidth: 58
        }}>
          <div style={{ fontSize: 9, fontWeight: 600, color: MED, textTransform: "uppercase", letterSpacing: 0.5 }}>{label}</div>
          <div style={{ fontSize: 13, fontWeight: 800, color: c.color }}>{value}</div>
        </div>
      );
    }

    // Dispatch intro screen
    function DispatchScreen({ scenario, onReady }) {
      const [dots, setDots] = useState("");

      useEffect(() => {
        const iv = setInterval(() => {
          setDots(d => d.length >= 3 ? "" : d + ".");
        }, 500);
        return () => clearInterval(iv);
      }, []);

      return (
        <div className="fade-in" style={{ padding: "0 16px 16px" }}>
          <div style={{
            background: "#0a0a0a",
            borderRadius: 14,
            padding: 24,
            color: "#00ff88",
            fontFamily: "'Courier New', monospace",
            marginBottom: 16,
            border: "1px solid #333",
            boxShadow: "0 4px 24px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05)"
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16 }}>
              <div className="dispatch-blink" style={{
                width: 8, height: 8, borderRadius: "50%",
                background: "#ff3333",
                boxShadow: "0 0 6px #ff3333"
              }} />
              <span style={{ fontSize: 11, color: "#ff6666", fontWeight: 700, letterSpacing: 2, textTransform: "uppercase" }}>
                INCOMING DISPATCH
              </span>
            </div>
            <div style={{ fontSize: 13, lineHeight: 1.7, marginBottom: 16, color: "#00ff88" }}>
              {scenario.dispatch}
            </div>
            <div style={{ fontSize: 11, color: "#666", borderTop: "1px solid #222", paddingTop: 10 }}>
              <span style={{ color: "#888" }}>PATIENTS:</span> {scenario.patients.length} identified &nbsp;|&nbsp;
              <span style={{ color: "#888" }}>TIME LIMIT:</span> {formatTime(scenario.timeLimit)} &nbsp;|&nbsp;
              <span style={{ color: "#888" }}>STATUS:</span> <span style={{ color: "#ffaa00" }}>AWAITING TRIAGE{dots}</span>
            </div>
          </div>

          <div style={{
            background: WHITE,
            borderRadius: 14,
            padding: 16,
            marginBottom: 16,
            border: "1px solid #E0E0E0",
            boxShadow: "0 1px 6px rgba(0,0,0,0.06)"
          }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: NAVY, marginBottom: 10 }}>Triage Categories Quick Reference</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
              {Object.entries(TRIAGE_CATS).map(([key, cat]) => (
                <div key={key} style={{
                  display: "flex", alignItems: "center", gap: 6,
                  padding: "6px 8px", borderRadius: 8,
                  background: cat.bgColor,
                  border: `1.5px solid ${cat.color}33`
                }}>
                  <div style={{
                    width: 14, height: 14, borderRadius: "50%",
                    background: cat.color, flexShrink: 0
                  }} />
                  <div>
                    <div style={{ fontSize: 11, fontWeight: 700, color: cat.color }}>{key}</div>
                    <div style={{ fontSize: 9, color: MED }}>{cat.desc}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          <div style={{ textAlign: "center" }}>
            <button
              onClick={onReady}
              style={{
                background: "linear-gradient(135deg, #2A9D8F, #1A6B6B)",
                color: WHITE,
                border: "none",
                borderRadius: 14,
                padding: "14px 40px",
                fontSize: 16,
                fontWeight: 700,
                cursor: "pointer",
                transition: "all 0.2s",
                boxShadow: "0 4px 12px rgba(42,157,143,0.3)"
              }}
              onMouseOver={(e) => {
                e.currentTarget.style.transform = "translateY(-1px)";
                e.currentTarget.style.boxShadow = "0 6px 16px rgba(42,157,143,0.4)";
              }}
              onMouseOut={(e) => {
                e.currentTarget.style.transform = "translateY(0)";
                e.currentTarget.style.boxShadow = "0 4px 12px rgba(42,157,143,0.3)";
              }}
            >
              Begin Triage
            </button>
          </div>
        </div>
      );
    }

    function PatientCard({ patient, showTriage, selectedDecision, onTriageChoice, showResult, phase }) {
      const getVitalStatus = (vitals) => {
        const sys = parseInt(vitals.bp.split("/")[0]);
        const pulse = vitals.pulse;
        const spo2 = vitals.spo2;

        const bpStatus = sys < 90 ? "critical" : sys < 100 || sys > 160 ? "warning" : "normal";
        const pulseStatus = pulse > 130 ? "critical" : pulse > 110 ? "warning" : "normal";
        const spo2Status = spo2 < 90 ? "critical" : spo2 < 95 ? "warning" : "normal";

        return { bpStatus, pulseStatus, spo2Status };
      };

      const getOverallAlert = (vitals) => {
        const sys = parseInt(vitals.bp.split("/")[0]);
        const spo2 = vitals.spo2;
        if (sys < 90 || spo2 < 90) return "critical";
        if (sys < 100 || sys > 160 || spo2 < 95 || vitals.pulse > 120) return "warning";
        return "normal";
      };

      const alertLevel = getOverallAlert(patient.vitals);
      const vs = getVitalStatus(patient.vitals);
      const borderColor = alertLevel === "critical" ? RED : alertLevel === "warning" ? YELLOW : "#D0D8E0";

      const isCorrect = showResult && selectedDecision === patient.correctTriage;
      const isIncorrect = showResult && selectedDecision && selectedDecision !== patient.correctTriage;

      return (
        <div
          className={showResult ? "correct-reveal" : "fade-in"}
          style={{
            background: showResult ? (isCorrect ? "#f0faf5" : "#fef5f5") : WHITE,
            borderRadius: 14,
            padding: 16,
            marginBottom: 12,
            border: showResult
              ? `2.5px solid ${isCorrect ? GREEN : RED}`
              : `2.5px solid ${selectedDecision ? TEAL : borderColor}`,
            boxShadow: selectedDecision && !showResult
              ? `0 0 0 3px ${TEAL}22`
              : "0 1px 6px rgba(0,0,0,0.06)",
            transition: "all 0.3s ease"
          }}
        >
          {/* Header row */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{
                background: alertLevel === "critical" ? RED : alertLevel === "warning" ? GOLD : NAVY,
                color: WHITE,
                width: 36, height: 36, borderRadius: "50%",
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: 16, fontWeight: 800,
                boxShadow: alertLevel === "critical" ? `0 0 0 3px ${RED}33` : "none"
              }}>
                {patient.id}
              </div>
              <div>
                <div style={{ fontWeight: 700, color: DARK, fontSize: 14 }}>{patient.name}</div>
                <div style={{ fontSize: 11, color: MED }}>Age {patient.age}</div>
              </div>
            </div>
            {alertLevel === "critical" && !showResult && (
              <span className="pulse" style={{ fontSize: 18, lineHeight: 1 }}>&#x1F534;</span>
            )}
            {showResult && (
              <span style={{
                background: isCorrect ? GREEN : RED,
                color: WHITE,
                padding: "4px 12px",
                borderRadius: 20,
                fontSize: 11,
                fontWeight: 700,
                display: "flex",
                alignItems: "center",
                gap: 4
              }}>
                {isCorrect ? "\u2713 Correct" : selectedDecision ? "\u2717 Incorrect" : "\u2298 Not triaged"}
              </span>
            )}
          </div>

          {/* Description */}
          <p style={{ fontSize: 13, color: DARK, margin: "0 0 10px", lineHeight: 1.5 }}>
            {patient.desc}
          </p>

          {/* Symptom tags */}
          <div style={{ display: "flex", gap: 4, flexWrap: "wrap", marginBottom: 10 }}>
            {patient.symptoms.map((s, i) => (
              <span key={i} style={{
                fontSize: 10,
                fontWeight: 600,
                padding: "2px 8px",
                borderRadius: 10,
                background: alertLevel === "critical" ? "#FADBD8" : alertLevel === "warning" ? "#FFF9E6" : "#EEF2F7",
                color: alertLevel === "critical" ? RED : alertLevel === "warning" ? "#856404" : MED
              }}>
                {s}
              </span>
            ))}
          </div>

          {/* Vital signs */}
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: showTriage || showResult ? 12 : 0 }}>
            <VitalBadge label="BP" value={patient.vitals.bp} status={vs.bpStatus} />
            <VitalBadge label="Pulse" value={patient.vitals.pulse} status={vs.pulseStatus} />
            <VitalBadge label="SpO2" value={`${patient.vitals.spo2}%`} status={vs.spo2Status} />
            <VitalBadge label="Temp" value={patient.vitals.temp} status="normal" />
          </div>

          {/* Triage buttons */}
          {showTriage && !showResult && (
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
              {Object.entries(TRIAGE_CATS).map(([key, cat]) => (
                <button
                  key={key}
                  onClick={() => onTriageChoice(patient.id, key)}
                  style={{
                    background: selectedDecision === key ? cat.color : WHITE,
                    color: selectedDecision === key ? WHITE : cat.color,
                    border: `2.5px solid ${cat.color}`,
                    borderRadius: 10,
                    padding: "10px 10px",
                    fontSize: 12,
                    fontWeight: 700,
                    cursor: "pointer",
                    transition: "all 0.2s",
                    display: "flex",
                    alignItems: "center",
                    justifyContent: "center",
                    gap: 6,
                    boxShadow: selectedDecision === key ? `0 2px 8px ${cat.color}44` : "none"
                  }}
                  onMouseOver={(e) => {
                    if (selectedDecision !== key) {
                      e.currentTarget.style.background = cat.bgColor;
                      e.currentTarget.style.transform = "translateY(-1px)";
                    }
                  }}
                  onMouseOut={(e) => {
                    if (selectedDecision !== key) {
                      e.currentTarget.style.background = WHITE;
                      e.currentTarget.style.transform = "translateY(0)";
                    }
                  }}
                >
                  <div style={{
                    width: 12, height: 12, borderRadius: "50%",
                    background: selectedDecision === key ? WHITE : cat.color,
                    flexShrink: 0
                  }} />
                  {key}
                </button>
              ))}
            </div>
          )}

          {/* Review result */}
          {showResult && (
            <div style={{
              background: isCorrect ? "#e6f7ee" : "#feeeed",
              borderRadius: 10,
              padding: 12,
              borderLeft: `4px solid ${isCorrect ? GREEN : RED}`
            }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: DARK }}>
                  Correct: <span style={{ color: TRIAGE_CATS[patient.correctTriage].color }}>{TRIAGE_CATS[patient.correctTriage].label}</span>
                </div>
                {isIncorrect && selectedDecision && (
                  <div style={{ fontSize: 11, color: RED, fontWeight: 600 }}>
                    Your call: {TRIAGE_CATS[selectedDecision].label}
                  </div>
                )}
              </div>
              <div style={{ fontSize: 11, fontWeight: 700, color: TEAL, marginBottom: 4, textTransform: "uppercase", letterSpacing: 0.5 }}>
                Clinical Reasoning
              </div>
              <p style={{ fontSize: 12, color: MED, margin: 0, lineHeight: 1.5 }}>
                {patient.reasoning}
              </p>
            </div>
          )}
        </div>
      );
    }

    // Running tally component
    function ScoreTally({ decisions, patients }) {
      const correct = patients.filter(p => decisions[p.id] === p.correctTriage).length;
      const attempted = Object.keys(decisions).length;
      const incorrect = attempted - correct;

      return (
        <div style={{
          display: "flex", alignItems: "center", gap: 12,
          padding: "6px 12px",
          background: WHITE,
          borderRadius: 20,
          boxShadow: "0 1px 4px rgba(0,0,0,0.08)",
          fontSize: 12,
          fontWeight: 700
        }}>
          <span style={{ color: GREEN }}>{correct} &#x2713;</span>
          <span style={{ color: RED }}>{incorrect} &#x2717;</span>
          <span style={{ color: MED }}>{patients.length - attempted} left</span>
        </div>
      );
    }

    function TriageSimulator() {
      const [scenarioIdx, setScenarioIdx] = useState(0);
      const [phase, setPhase] = useState("select"); // select | dispatch | playing | review | final
      const [seconds, setSeconds] = useState(0);
      const [timeLeft, setTimeLeft] = useState(0);
      const [triageDecisions, setTriageDecisions] = useState({});
      const [score, setScore] = useState(0);
      const [totalCorrect, setTotalCorrect] = useState(0);
      const [totalPatients, setTotalPatients] = useState(0);
      const [roundsCompleted, setRoundsCompleted] = useState(0);
      const [bestScores, setBestScores] = useState({});
      const [allDecisionsLog, setAllDecisionsLog] = useState([]);
      const intervalRef = useRef(null);

      const scenario = scenarios[scenarioIdx];

      useEffect(() => {
        if (phase === "playing") {
          if (timeLeft <= 0) {
            handleSubmit();
            return;
          }
          intervalRef.current = setInterval(() => {
            setTimeLeft((t) => {
              if (t <= 1) {
                clearInterval(intervalRef.current);
                intervalRef.current = null;
                return 0;
              }
              return t - 1;
            });
            setSeconds((s) => s + 1);
          }, 1000);
        }
        return () => {
          if (intervalRef.current) {
            clearInterval(intervalRef.current);
            intervalRef.current = null;
          }
        };
      }, [phase]);

      // Auto-submit when time runs out
      useEffect(() => {
        if (phase === "playing" && timeLeft <= 0 && seconds > 0) {
          handleSubmit();
        }
      }, [timeLeft]);

      const handleStartScenario = () => {
        setTriageDecisions({});
        setSeconds(0);
        setPhase("dispatch");
      };

      const handleDispatchReady = () => {
        setTimeLeft(scenario.timeLimit);
        setPhase("playing");
      };

      const handleTriageChoice = (patientId, category) => {
        setTriageDecisions((prev) => ({
          ...prev,
          [patientId]: category
        }));
      };

      const handleSubmit = useCallback(() => {
        if (intervalRef.current) {
          clearInterval(intervalRef.current);
          intervalRef.current = null;
        }

        let pts = 0;
        let correct = 0;

        scenario.patients.forEach((patient) => {
          const userChoice = triageDecisions[patient.id];
          const correctChoice = patient.correctTriage;

          if (userChoice === correctChoice) {
            pts += 25;
            correct++;
            if (correctChoice === "RED") pts += 15;
          } else if (userChoice && correctChoice) {
            const userPriority = TRIAGE_CATS[userChoice]?.priority;
            const correctPriority = TRIAGE_CATS[correctChoice].priority;
            if (userPriority !== undefined && Math.abs(userPriority - correctPriority) === 1) {
              pts += 10;
            }
          }
        });

        let timeBonus = 0;
        if (timeLeft > scenario.timeLimit / 2) timeBonus = 15;
        else if (timeLeft > 0) timeBonus = 8;

        const roundScore = pts + timeBonus;
        setScore(roundScore);
        setTotalCorrect(prev => prev + correct);
        setTotalPatients(prev => prev + scenario.patients.length);
        setRoundsCompleted((prev) => prev + 1);

        // Log decisions for final report
        setAllDecisionsLog(prev => [...prev, {
          scenario: scenario.title,
          patients: scenario.patients.map(p => ({
            name: p.name,
            correct: p.correctTriage,
            chosen: triageDecisions[p.id] || null,
            isCorrect: triageDecisions[p.id] === p.correctTriage
          })),
          score: roundScore,
          time: seconds
        }]);

        const newBestScores = { ...bestScores };
        if (!newBestScores[scenario.id] || roundScore > newBestScores[scenario.id]) {
          newBestScores[scenario.id] = roundScore;
        }
        setBestScores(newBestScores);

        setPhase("review");
      }, [scenario, triageDecisions, timeLeft, seconds, bestScores]);

      const handleNextScenario = () => {
        const nextIdx = (scenarioIdx + 1) % scenarios.length;
        setScenarioIdx(nextIdx);
        setPhase("select");
      };

      const handleFinishAll = () => {
        setPhase("final");
      };

      const handleRestartAll = () => {
        setScenarioIdx(0);
        setPhase("select");
        setTriageDecisions({});
        setScore(0);
        setTotalCorrect(0);
        setTotalPatients(0);
        setRoundsCompleted(0);
        setBestScores({});
        setAllDecisionsLog([]);
        if (intervalRef.current) {
          clearInterval(intervalRef.current);
          intervalRef.current = null;
        }
      };

      const allTriaged = Object.keys(triageDecisions).length === scenario.patients.length;
      const timeWarning = timeLeft < 30 && timeLeft > 0;
      const timeCritical = timeLeft < 15 && timeLeft > 0;

      // FINAL INCIDENT REPORT
      if (phase === "final") {
        const overallAccuracy = totalPatients > 0 ? Math.round((totalCorrect / totalPatients) * 100) : 0;

        let totalByCategory = { RED: 0, YELLOW: 0, GREEN: 0, BLACK: 0 };
        let correctByCategory = { RED: 0, YELLOW: 0, GREEN: 0, BLACK: 0 };

        allDecisionsLog.forEach(log => {
          log.patients.forEach(p => {
            totalByCategory[p.correct]++;
            if (p.isCorrect) correctByCategory[p.correct]++;
          });
        });

        const totalScore = allDecisionsLog.reduce((sum, l) => sum + l.score, 0);
        const maxPossible = allDecisionsLog.reduce((sum, l) => {
          let max = 0;
          scenarios.find(s => s.title === l.scenario)?.patients.forEach(p => {
            max += 25;
            if (p.correctTriage === "RED") max += 15;
          });
          max += 15; // time bonus
          return sum + max;
        }, 0);

        return (
          <div style={{ fontFamily: "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif", minHeight: "100vh", display: "flex", flexDirection: "column" }}>
            <AppHeader />
            <div style={{ flex: 1, maxWidth: 700, margin: "0 auto", padding: "16px", width: "100%" }}>
              <div className="fade-in" style={{ textAlign: "center", marginBottom: 20 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: GOLD, letterSpacing: 2, textTransform: "uppercase", marginBottom: 6 }}>
                  Simulation Complete
                </div>
                <h1 style={{ fontSize: 26, fontWeight: 800, color: NAVY, margin: "0 0 4px" }}>
                  Incident Report
                </h1>
                <p style={{ fontSize: 13, color: MED, margin: 0 }}>
                  {scenarios.length} scenarios &middot; {totalPatients} patients triaged
                </p>
              </div>

              {/* Overall score */}
              <div className="slide-up" style={{
                textAlign: "center",
                padding: 24,
                borderRadius: 14,
                background: overallAccuracy >= 80 ? "linear-gradient(135deg, #e6f7ee, #d4f0e0)" : overallAccuracy >= 60 ? "linear-gradient(135deg, #FFF9E6, #fff3cd)" : "linear-gradient(135deg, #fef5f5, #feeeed)",
                marginBottom: 16,
                border: `2px solid ${overallAccuracy >= 80 ? GREEN : overallAccuracy >= 60 ? GOLD : RED}`,
                boxShadow: "0 2px 12px rgba(0,0,0,0.06)"
              }}>
                <div style={{
                  fontSize: 52,
                  fontWeight: 800,
                  color: overallAccuracy >= 80 ? GREEN : overallAccuracy >= 60 ? GOLD : RED,
                  marginBottom: 4,
                  lineHeight: 1
                }}>
                  {overallAccuracy}%
                </div>
                <div style={{ fontSize: 16, fontWeight: 700, color: NAVY, marginBottom: 6 }}>
                  Triage Accuracy
                </div>
                <div style={{ fontSize: 13, color: MED }}>
                  {overallAccuracy >= 90 && "Expert Level \u2014 Exceptional triage decisions across all scenarios."}
                  {overallAccuracy >= 75 && overallAccuracy < 90 && "Proficient \u2014 Strong triage judgment with room for refinement."}
                  {overallAccuracy >= 60 && overallAccuracy < 75 && "Developing \u2014 Good foundational skills. Continue practice."}
                  {overallAccuracy < 60 && "Needs Review \u2014 Study the clinical reasoning and try again."}
                </div>
                <div style={{ fontSize: 12, color: MED, marginTop: 8, padding: "6px 0", borderTop: "1px solid rgba(0,0,0,0.08)" }}>
                  {totalCorrect}/{totalPatients} correct &middot; Total score: {totalScore} pts
                </div>
              </div>

              {/* Category breakdown */}
              <div className="slide-up" style={{
                background: WHITE,
                border: "1px solid #E0E0E0",
                borderRadius: 14,
                padding: 16,
                marginBottom: 16,
                boxShadow: "0 1px 6px rgba(0,0,0,0.06)"
              }}>
                <div style={{ fontSize: 14, fontWeight: 700, color: NAVY, marginBottom: 14 }}>
                  Accuracy by Triage Category
                </div>
                {Object.entries(TRIAGE_CATS).map(([key, cat]) => {
                  const total = totalByCategory[key] || 0;
                  const correct = correctByCategory[key] || 0;
                  const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
                  return total > 0 ? (
                    <div key={key} style={{ marginBottom: 14 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4, alignItems: "center" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                          <div style={{ width: 12, height: 12, borderRadius: "50%", background: cat.color }} />
                          <span style={{ fontSize: 13, fontWeight: 700, color: DARK }}>{cat.label}</span>
                        </div>
                        <span style={{ fontSize: 13, fontWeight: 700, color: cat.color }}>{correct}/{total} ({pct}%)</span>
                      </div>
                      <div style={{
                        background: "#EEF2F7",
                        borderRadius: 6,
                        height: 8,
                        overflow: "hidden"
                      }}>
                        <div style={{
                          background: cat.color,
                          height: "100%",
                          width: `${pct}%`,
                          borderRadius: 6,
                          transition: "width 0.8s ease"
                        }} />
                      </div>
                    </div>
                  ) : null;
                })}
              </div>

              {/* Scenario breakdown */}
              <div className="slide-up" style={{
                background: WHITE,
                border: "1px solid #E0E0E0",
                borderRadius: 14,
                padding: 16,
                marginBottom: 16,
                boxShadow: "0 1px 6px rgba(0,0,0,0.06)"
              }}>
                <div style={{ fontSize: 14, fontWeight: 700, color: NAVY, marginBottom: 14 }}>
                  Scenario Breakdown
                </div>
                {allDecisionsLog.map((log, i) => {
                  const scenCorrect = log.patients.filter(p => p.isCorrect).length;
                  const scenTotal = log.patients.length;
                  const scenPct = Math.round((scenCorrect / scenTotal) * 100);
                  return (
                    <div key={i} style={{
                      display: "flex", justifyContent: "space-between", alignItems: "center",
                      padding: "10px 12px",
                      background: i % 2 === 0 ? "#fafbfc" : WHITE,
                      borderRadius: 8,
                      marginBottom: 4
                    }}>
                      <div>
                        <div style={{ fontSize: 13, fontWeight: 700, color: DARK }}>{scenarios[i]?.icon} {log.scenario}</div>
                        <div style={{ fontSize: 11, color: MED }}>{scenCorrect}/{scenTotal} correct &middot; {formatTime(log.time)}</div>
                      </div>
                      <div style={{
                        background: scenPct >= 80 ? "#e6f7ee" : scenPct >= 60 ? "#FFF9E6" : "#fef5f5",
                        color: scenPct >= 80 ? GREEN : scenPct >= 60 ? GOLD : RED,
                        padding: "4px 12px",
                        borderRadius: 20,
                        fontSize: 13,
                        fontWeight: 800
                      }}>
                        {scenPct}%
                      </div>
                    </div>
                  );
                })}
              </div>

              {/* Debrief */}
              <div className="slide-up" style={{
                background: "#FFF9E6",
                border: `2px solid ${GOLD}`,
                borderRadius: 14,
                padding: 16,
                marginBottom: 16
              }}>
                <div style={{ fontWeight: 700, color: NAVY, fontSize: 14, marginBottom: 10 }}>
                  Debrief Questions
                </div>
                <div style={{ fontSize: 13, color: DARK, lineHeight: 1.8 }}>
                  <p style={{ margin: "0 0 8px" }}>1. What was the hardest triage decision you made, and why?</p>
                  <p style={{ margin: "0 0 8px" }}>2. How did time pressure affect your decision-making?</p>
                  <p style={{ margin: "0 0 8px" }}>3. Were there cases where you over-triaged (too high priority) or under-triaged? What made those cases tricky?</p>
                  <p style={{ margin: 0 }}>4. How would you approach the BLACK (expectant) category differently after seeing the reasoning?</p>
                </div>
              </div>

              <div style={{ textAlign: "center", paddingBottom: 8 }}>
                <button
                  onClick={handleRestartAll}
                  style={{
                    background: "linear-gradient(135deg, #2A9D8F, #1A6B6B)",
                    color: WHITE,
                    border: "none",
                    borderRadius: 14,
                    padding: "14px 36px",
                    fontSize: 15,
                    fontWeight: 700,
                    cursor: "pointer",
                    transition: "all 0.2s",
                    boxShadow: "0 4px 12px rgba(42,157,143,0.3)"
                  }}
                  onMouseOver={(e) => {
                    e.currentTarget.style.transform = "translateY(-1px)";
                    e.currentTarget.style.boxShadow = "0 6px 16px rgba(42,157,143,0.4)";
                  }}
                  onMouseOut={(e) => {
                    e.currentTarget.style.transform = "translateY(0)";
                    e.currentTarget.style.boxShadow = "0 4px 12px rgba(42,157,143,0.3)";
                  }}
                >
                  Start Over
                </button>
              </div>
            </div>
            <AppFooter />
          </div>
        );
      }

      // MAIN SIMULATOR VIEW
      return (
        <div style={{ fontFamily: "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif", minHeight: "100vh", display: "flex", flexDirection: "column" }}>
          <AppHeader />

          <div style={{ flex: 1, maxWidth: 700, margin: "0 auto", padding: "16px", width: "100%" }}>

            {/* Scenario progress + timer bar */}
            <div style={{
              display: "flex",
              justifyContent: "space-between",
              alignItems: "center",
              gap: 10,
              marginBottom: 16,
              padding: "10px 14px",
              background: WHITE,
              borderRadius: 14,
              boxShadow: "0 1px 6px rgba(0,0,0,0.06)",
              flexWrap: "wrap"
            }}>
              <div>
                <div style={{ fontSize: 10, color: MED, fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5 }}>Scenarios</div>
                <div style={{ fontSize: 18, fontWeight: 800, color: TEAL }}>
                  {Math.min(roundsCompleted + 1, scenarios.length)}/{scenarios.length}
                </div>
              </div>

              {/* Scenario selector dots */}
              <div style={{ display: "flex", gap: 6 }}>
                {scenarios.map((s, i) => (
                  <div key={i} style={{
                    width: 10, height: 10, borderRadius: "50%",
                    background: i < roundsCompleted ? GREEN : i === scenarioIdx ? TEAL : "#ddd",
                    transition: "all 0.3s"
                  }} />
                ))}
              </div>

              {phase === "playing" && (
                <div
                  className={timeCritical ? "urgent-pulse timer-pulse" : ""}
                  style={{
                    textAlign: "center",
                    padding: "8px 14px",
                    borderRadius: 10,
                    background: timeCritical ? "#FDE8E8" : timeWarning ? "#FFF3CD" : "#E8F8F1",
                    border: `2px solid ${timeCritical ? RED : timeWarning ? YELLOW : GREEN}`,
                    transition: "all 0.3s"
                  }}
                >
                  <div style={{ fontSize: 10, color: MED, fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5 }}>Time Left</div>
                  <div style={{
                    fontSize: 20,
                    fontWeight: 800,
                    color: timeCritical ? RED : timeWarning ? "#856404" : TEAL,
                    fontVariantNumeric: "tabular-nums"
                  }}>
                    {formatTime(timeLeft)}
                  </div>
                </div>
              )}

              {phase === "playing" && (
                <ScoreTally decisions={triageDecisions} patients={scenario.patients} />
              )}

              {phase !== "select" && phase !== "dispatch" && (
                <button
                  onClick={handleRestartAll}
                  style={{
                    background: "none",
                    border: `2px solid ${TEAL}`,
                    color: TEAL,
                    borderRadius: 10,
                    padding: "8px 14px",
                    fontSize: 12,
                    fontWeight: 700,
                    cursor: "pointer",
                    transition: "all 0.2s"
                  }}
                  onMouseOver={(e) => {
                    e.currentTarget.style.background = TEAL;
                    e.currentTarget.style.color = WHITE;
                  }}
                  onMouseOut={(e) => {
                    e.currentTarget.style.background = "none";
                    e.currentTarget.style.color = TEAL;
                  }}
                >
                  Restart
                </button>
              )}
            </div>

            {/* Scenario info banner */}
            <div style={{
              background: WHITE,
              border: `2px solid ${GOLD}`,
              borderRadius: 14,
              padding: 14,
              marginBottom: 16,
              boxShadow: "0 1px 6px rgba(0,0,0,0.06)"
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                <span style={{ fontSize: 20 }}>{scenario.icon}</span>
                <span style={{ fontWeight: 800, color: NAVY, fontSize: 16 }}>{scenario.title}</span>
              </div>
              <p style={{ fontSize: 13, color: MED, margin: 0, lineHeight: 1.5 }}>
                {scenario.setting}
              </p>
            </div>

            {/* SELECT phase */}
            {phase === "select" && (
              <div className="fade-in" style={{ textAlign: "center", padding: "20px 0" }}>
                <div style={{
                  fontSize: 12, fontStyle: "italic", color: TEAL, marginBottom: 10, lineHeight: 1.5
                }}>
                  Session 6: Everything you've learned comes together in triage.
                </div>
                <div style={{
                  fontSize: 13, color: MED, marginBottom: 16, lineHeight: 1.6
                }}>
                  You will receive a dispatch briefing, then triage {scenario.patients.length} patients
                  under a {formatTime(scenario.timeLimit)} time limit.
                </div>
                <button
                  onClick={handleStartScenario}
                  style={{
                    background: "linear-gradient(135deg, #2A9D8F, #1A6B6B)",
                    color: WHITE,
                    border: "none",
                    borderRadius: 14,
                    padding: "14px 40px",
                    fontSize: 16,
                    fontWeight: 700,
                    cursor: "pointer",
                    transition: "all 0.2s",
                    boxShadow: "0 4px 12px rgba(42,157,143,0.3)"
                  }}
                  onMouseOver={(e) => {
                    e.currentTarget.style.transform = "translateY(-1px)";
                    e.currentTarget.style.boxShadow = "0 6px 16px rgba(42,157,143,0.4)";
                  }}
                  onMouseOut={(e) => {
                    e.currentTarget.style.transform = "translateY(0)";
                    e.currentTarget.style.boxShadow = "0 4px 12px rgba(42,157,143,0.3)";
                  }}
                >
                  Start Scenario
                </button>
              </div>
            )}

            {/* DISPATCH phase */}
            {phase === "dispatch" && (
              <DispatchScreen scenario={scenario} onReady={handleDispatchReady} />
            )}

            {/* PLAYING phase */}
            {phase === "playing" && (
              <div>
                <div style={{ fontSize: 13, fontWeight: 700, color: NAVY, marginBottom: 12 }}>
                  Triage all {scenario.patients.length} patients:
                </div>

                {scenario.patients.map((patient, i) => (
                  <div key={patient.id} style={{ animationDelay: `${i * 0.05}s` }}>
                    <PatientCard
                      patient={patient}
                      showTriage={true}
                      selectedDecision={triageDecisions[patient.id]}
                      onTriageChoice={handleTriageChoice}
                      showResult={false}
                      phase={phase}
                    />
                  </div>
                ))}

                <div style={{
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "space-between",
                  marginTop: 16,
                  padding: "12px 14px",
                  background: allTriaged ? "#e6f7ee" : WHITE,
                  borderRadius: 14,
                  border: allTriaged ? `2px solid ${GREEN}` : "1px solid #E0E0E0",
                  boxShadow: "0 1px 6px rgba(0,0,0,0.06)",
                  transition: "all 0.3s"
                }}>
                  <span style={{ fontSize: 13, color: MED, fontWeight: 600 }}>
                    Triaged: <strong style={{ color: allTriaged ? GREEN : DARK }}>{Object.keys(triageDecisions).length}/{scenario.patients.length}</strong>
                  </span>
                  {allTriaged && (
                    <button
                      onClick={handleSubmit}
                      className="slide-in"
                      style={{
                        background: "linear-gradient(135deg, #27AE60, #1e8449)",
                        color: WHITE,
                        border: "none",
                        borderRadius: 10,
                        padding: "10px 24px",
                        fontSize: 14,
                        fontWeight: 700,
                        cursor: "pointer",
                        boxShadow: "0 4px 12px rgba(39,174,96,0.3)",
                        transition: "all 0.2s"
                      }}
                      onMouseOver={(e) => {
                        e.currentTarget.style.transform = "translateY(-1px)";
                      }}
                      onMouseOut={(e) => {
                        e.currentTarget.style.transform = "translateY(0)";
                      }}
                    >
                      Submit Triage
                    </button>
                  )}
                </div>
              </div>
            )}

            {/* REVIEW phase */}
            {phase === "review" && (
              <div>
                {/* Score card */}
                <div className="slide-up" style={{
                  textAlign: "center",
                  padding: 20,
                  borderRadius: 14,
                  background: score >= 150 ? "linear-gradient(135deg, #e6f7ee, #d4f0e0)" : score >= 120 ? "linear-gradient(135deg, #FFF9E6, #fff3cd)" : "linear-gradient(135deg, #fef5f5, #feeeed)",
                  marginBottom: 16,
                  border: `2px solid ${score >= 150 ? GREEN : score >= 120 ? GOLD : RED}`,
                  boxShadow: "0 2px 12px rgba(0,0,0,0.06)"
                }}>
                  <div style={{
                    fontSize: 44,
                    fontWeight: 800,
                    color: score >= 150 ? GREEN : score >= 120 ? GOLD : RED,
                    lineHeight: 1
                  }}>
                    {score} pts
                  </div>
                  <div style={{ fontSize: 14, fontWeight: 700, color: NAVY, marginTop: 6 }}>
                    {score >= 180 ? "Perfect! Masterful triage decisions." :
                     score >= 150 ? "Excellent! Strong clinical judgment." :
                     score >= 120 ? "Good work. A few adjustments needed." :
                     score >= 100 ? "Decent. Study the reasoning below." :
                     "Review carefully. Triage is critical."}
                  </div>
                  <div style={{ display: "flex", justifyContent: "center", gap: 16, marginTop: 10, fontSize: 12, color: MED }}>
                    <span>Time: {formatTime(seconds)}</span>
                    <span>Correct: {scenario.patients.filter(p => triageDecisions[p.id] === p.correctTriage).length}/{scenario.patients.length}</span>
                    <span>Bonus: +{timeLeft > scenario.timeLimit / 2 ? "15" : timeLeft > 0 ? "8" : "0"}</span>
                  </div>
                </div>

                <div style={{ fontSize: 14, fontWeight: 700, color: NAVY, marginBottom: 12 }}>
                  Patient Review & Clinical Reasoning:
                </div>

                {scenario.patients.map((patient, i) => (
                  <div key={patient.id} style={{ animationDelay: `${i * 0.08}s` }}>
                    <PatientCard
                      patient={patient}
                      showTriage={false}
                      selectedDecision={triageDecisions[patient.id]}
                      onTriageChoice={() => {}}
                      showResult={true}
                      phase={phase}
                    />
                  </div>
                ))}

                <div style={{ textAlign: "center", marginTop: 20, paddingBottom: 8 }}>
                  <button
                    onClick={scenarioIdx < scenarios.length - 1 ? handleNextScenario : handleFinishAll}
                    style={{
                      background: "linear-gradient(135deg, #2A9D8F, #1A6B6B)",
                      color: WHITE,
                      border: "none",
                      borderRadius: 14,
                      padding: "14px 36px",
                      fontSize: 15,
                      fontWeight: 700,
                      cursor: "pointer",
                      transition: "all 0.2s",
                      boxShadow: "0 4px 12px rgba(42,157,143,0.3)"
                    }}
                    onMouseOver={(e) => {
                      e.currentTarget.style.transform = "translateY(-1px)";
                      e.currentTarget.style.boxShadow = "0 6px 16px rgba(42,157,143,0.4)";
                    }}
                    onMouseOut={(e) => {
                      e.currentTarget.style.transform = "translateY(0)";
                      e.currentTarget.style.boxShadow = "0 4px 12px rgba(42,157,143,0.3)";
                    }}
                  >
                    {scenarioIdx < scenarios.length - 1 ? "Next Scenario \u2192" : "View Incident Report"}
                  </button>
                </div>
              </div>
            )}
          </div>

          <AppFooter />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<TriageSimulator />);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instrument ID Game - Woven Learning Mini Med School</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #F0F4F8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    @keyframes scorePop {
      0% { transform: scale(0.8); opacity: 0; }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes streakGlow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(212,168,67,0.4); }
      50% { box-shadow: 0 0 0 10px rgba(212,168,67,0); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes correctGlow {
      0% { box-shadow: 0 0 0 0 rgba(42,157,143,0.5); }
      50% { box-shadow: 0 0 20px 4px rgba(42,157,143,0.3); }
      100% { box-shadow: 0 0 0 0 rgba(42,157,143,0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes flipIn {
      from { transform: rotateY(90deg); opacity: 0; }
      to { transform: rotateY(0deg); opacity: 1; }
    }

    @keyframes countdownPulse {
      0%, 100% { transform: scale(1); color: #C0392B; }
      50% { transform: scale(1.15); color: #E74C3C; }
    }

    @keyframes timerUrgent {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes comboFlash {
      0% { transform: scale(1); }
      25% { transform: scale(1.3); }
      50% { transform: scale(1); }
      75% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    @keyframes modeCardHover {
      from { transform: translateY(0); }
      to { transform: translateY(-2px); }
    }

    @media (max-width: 600px) {
      body { padding: 0; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useCallback, useEffect, useRef, useMemo } = React;

    const NAVY = "#1B3A5C";
    const TEAL = "#2A9D8F";
    const TEAL_DARK = "#1A6B6B";
    const GOLD = "#D4A843";
    const DARK = "#333333";
    const MED = "#555555";
    const LIGHT_BG = "#F0F4F8";
    const TEAL_BG = "#E8F5F2";
    const CASE_BG = "#FFF8E1";
    const ALERT_BG = "#FDE8E8";
    const WHITE = "#FFFFFF";

    const CATEGORY_COLORS = {
      "Cutting": { bg: "#FDEDEC", color: "#E74C3C", icon: "\u2702\uFE0F" },
      "Suturing": { bg: "#EBF5FB", color: "#3498DB", icon: "\u{1FAA1}" },
      "Grasping": { bg: "#EAFAF1", color: "#2ECC71", icon: "\u{1F90F}" },
      "Clamping": { bg: "#FDF2E9", color: "#E67E22", icon: "\u{1F4CE}" },
      "Exposure": { bg: "#F4ECF7", color: "#9B59B6", icon: "\u{1F50D}" },
      "Laparoscopic": { bg: "#E8F8F5", color: "#1ABC9C", icon: "\u{1F3AE}" },
      "Diagnostic": { bg: "#FEF9E7", color: "#F39C12", icon: "\u{1FA7A}" }
    };

    // Woven 4-diamond logo SVG
    const WovenLogo = ({ size = 24 }) => (
      <svg viewBox="0 0 40 40" width={size} height={size}>
        <polygon points="13,2 24,13 13,24 2,13" fill="#0ABAB5" opacity="0.85"/>
        <polygon points="27,2 38,13 27,24 16,13" fill="#F5B731" opacity="0.85"/>
        <polygon points="13,16 24,27 13,38 2,27" fill="#E65C3C" opacity="0.85"/>
        <polygon points="27,16 38,27 27,38 16,27" fill="#7A2D4E" opacity="0.85"/>
      </svg>
    );

    // Branded header
    const AppHeader = () => (
      <div style={{
        background: "linear-gradient(135deg, #2A9D8F 0%, #1A6B6B 100%)",
        padding: "14px 20px",
        display: "flex",
        alignItems: "center",
        gap: 12,
        boxShadow: "0 2px 8px rgba(0,0,0,0.12)"
      }}>
        <WovenLogo size={28} />
        <div>
          <div style={{ fontSize: 15, fontWeight: 700, color: WHITE, letterSpacing: 0.3 }}>Mini Med School</div>
          <div style={{ fontSize: 10, color: "rgba(255,255,255,0.75)", fontWeight: 500, letterSpacing: 0.5 }}>WOVEN LEARNING</div>
        </div>
      </div>
    );

    // Footer
    const AppFooter = () => (
      <div style={{
        textAlign: "center",
        padding: "14px 20px",
        borderTop: "3px solid #D4A843",
        background: WHITE,
        fontSize: "0.75rem",
        color: "#999",
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        gap: 6,
        marginTop: "auto"
      }}>
        <WovenLogo size={16} />
        <span>Built by <strong style={{ color: TEAL_DARK }}>Woven Learning & Technology</strong></span>
      </div>
    );

    // Professional colored badge with instrument initials
    const InstrumentBadge = ({ name, category, size = 48 }) => {
      const cat = CATEGORY_COLORS[category] || { color: "#666", bg: "#EEE" };
      const initials = name.split(/[\s(]/)[0].substring(0, 2).toUpperCase();
      return (
        <div style={{
          width: size, height: size, borderRadius: "50%",
          background: `linear-gradient(135deg, ${cat.color}15, ${cat.color}30)`,
          border: `3px solid ${cat.color}`,
          display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: size * 0.35, fontWeight: 800, color: cat.color,
          letterSpacing: -0.5,
          boxShadow: `0 2px 8px ${cat.color}25`,
          flexShrink: 0
        }}>
          {initials}
        </div>
      );
    };

    // Category badge pill
    const CategoryBadge = ({ category, size = "sm" }) => {
      const cat = CATEGORY_COLORS[category] || { color: "#666", bg: "#EEE", icon: "" };
      const fontSize = size === "lg" ? 13 : 11;
      const padding = size === "lg" ? "5px 14px" : "3px 12px";
      return (
        <span style={{
          fontSize, fontWeight: 700, color: cat.color,
          background: cat.bg, padding, borderRadius: 12,
          display: "inline-flex", alignItems: "center", gap: 4,
          border: `1px solid ${cat.color}20`
        }}>
          <span style={{ fontSize: fontSize + 1 }}>{cat.icon}</span> {category}
        </span>
      );
    };

    const instruments = [
      {
        name: "Scalpel (#10 Blade)",
        category: "Cutting",
        desc: "The surgeon's primary cutting tool. The #10 blade has a curved cutting edge, used for making skin incisions. Held like a violin bow for long incisions or like a pencil for precise cuts.",
        use: "Making the initial incision to access the surgical site.",
        funFact: "Surgeons change blades frequently during a case - a dull blade causes more tissue damage than a sharp one.",
        session: "Session 3 & 4"
      },
      {
        name: "Needle Driver (Needle Holder)",
        category: "Suturing",
        desc: "Looks like a locking clamp with a flat, cross-hatched jaw surface. Used to grip the suture needle while stitching. The lock mechanism keeps the needle secure.",
        use: "Driving a curved needle through tissue during suturing. The most-used instrument during wound closure.",
        funFact: "You grip it with thumb and ring finger in the finger rings, using your index finger to guide - never with your whole fist.",
        session: "Session 3"
      },
      {
        name: "Tissue Forceps (Adson)",
        category: "Grasping",
        desc: "Tweezer-like instrument with small teeth at the tip. Held like a pencil between thumb and index finger. Used to gently hold tissue while suturing or dissecting.",
        use: "Stabilizing wound edges while the needle passes through, or lifting tissue to inspect beneath it.",
        funFact: "The teeth grip tissue without crushing - smooth forceps require more squeezing force, which actually causes more damage.",
        session: "Session 3"
      },
      {
        name: "Hemostat (Kelly Clamp)",
        category: "Clamping",
        desc: "A locking clamp with serrated jaws. Looks like scissors but the blades don't have a cutting edge - they're designed to crush and hold. Has a ratchet lock mechanism.",
        use: "Clamping blood vessels to stop bleeding. Also used to hold tissue, clamp drapes, or grab small objects in the surgical field.",
        funFact: "Named after Howard Kelly, one of the 'Big Four' founders of Johns Hopkins Hospital. The clamp literally saved lives by controlling hemorrhage during surgery.",
        session: "Session 4"
      },
      {
        name: "Suture Scissors (Mayo)",
        category: "Cutting",
        desc: "Heavy-duty scissors with blunt tips. The blades are thicker than regular scissors and designed to cut suture material cleanly without fraying.",
        use: "Cutting suture threads after tying knots. The blunt tips prevent accidentally cutting nearby tissue.",
        funFact: "Never use suture scissors to cut anything else - cutting drapes, tape, or bandages will dull the blades and ruin them for suture cutting.",
        session: "Session 3 & 4"
      },
      {
        name: "Retractor (Army-Navy)",
        category: "Exposure",
        desc: "A double-ended handheld retractor with flat, curved blades at each end. One end is narrower than the other, giving you two sizes in one instrument.",
        use: "Pulling back tissue or wound edges to give the surgeon a clear view of the operating area. An assistant holds it while the surgeon works.",
        funFact: "Called 'Army-Navy' because it was designed to be simple enough for both Army and Navy field surgeons - no frills, just works.",
        session: "Session 4"
      },
      {
        name: "Laparoscopic Grasper",
        category: "Laparoscopic",
        desc: "A long, thin instrument (30+ cm) with a pistol-grip handle and small jaws at the tip. Inserted through a trocar port during minimally invasive surgery.",
        use: "Grasping and manipulating tissue inside the body during laparoscopic procedures. The fulcrum effect means your hand moves opposite to the jaw tip.",
        funFact: "The 'fulcrum effect' is what makes laparoscopic surgery so challenging - move your hand left and the tip goes right. It takes hundreds of hours to master.",
        session: "Session 5"
      },
      {
        name: "Trocar",
        category: "Laparoscopic",
        desc: "A sharp-pointed instrument inside a hollow tube (cannula). Used to puncture the abdominal wall to create a port for laparoscopic instruments.",
        use: "Creating access ports. Once the trocar punctures through, it's removed and the cannula stays in place as a channel for instruments and the camera.",
        funFact: "Modern trocars have blade shields that spring forward after penetration to prevent the sharp tip from damaging organs inside.",
        session: "Session 5"
      },
      {
        name: "Laparoscope (Camera)",
        category: "Laparoscopic",
        desc: "A rigid telescope with a camera attached, inserted through a trocar port. Transmits a magnified image to monitors in the OR. Available in 0\u00B0 (straight) and 30\u00B0 (angled) views.",
        use: "The surgeon's eyes during laparoscopic surgery. Everything they see comes through this camera. An assistant or robotic arm holds and aims it.",
        funFact: "A 30\u00B0 scope lets you 'look around corners' inside the body by rotating it - a skill that takes significant practice to master.",
        session: "Session 5"
      },
      {
        name: "Pulse Oximeter",
        category: "Diagnostic",
        desc: "A small clip that attaches to the fingertip. Uses light wavelengths to measure blood oxygen saturation (SpO2) and pulse rate through the skin.",
        use: "Continuous monitoring of a patient's oxygen levels and heart rate. Normal SpO2 is 95-100%. Below 92% is concerning.",
        funFact: "It works by shining red and infrared light through your finger - oxygenated blood absorbs different wavelengths than deoxygenated blood.",
        session: "Session 1"
      },
      {
        name: "Sphygmomanometer (BP Cuff)",
        category: "Diagnostic",
        desc: "The blood pressure cuff. Consists of an inflatable cuff, a pressure gauge, and a bulb for inflation. Wraps around the upper arm above the elbow.",
        use: "Measuring systolic and diastolic blood pressure. The cuff compresses the brachial artery, and pressure is slowly released while listening with a stethoscope.",
        funFact: "The word 'sphygmomanometer' comes from the Greek 'sphygmos' (pulse) + 'manometer' (pressure meter). Most people just say 'BP cuff.'",
        session: "Session 1"
      },
      {
        name: "Reflex Hammer",
        category: "Diagnostic",
        desc: "A small hammer with a triangular rubber head. Designed to elicit deep tendon reflexes by striking tendons. The handle is weighted for a pendulum-like swing.",
        use: "Testing the patellar reflex (knee jerk) and other deep tendon reflexes. Assesses nerve pathway integrity between the spinal cord and extremities.",
        funFact: "Hold it loosely at the end and let gravity do the work - if you grip it tightly and swing hard, you'll actually get a worse response (and hurt the patient).",
        session: "Session 1"
      },
    ];

    const categories = [...new Set(instruments.map(i => i.category))];

    // ========== PROGRESS BAR ==========
    function ProgressBar({ value, max, color = TEAL }) {
      const pct = Math.round((value / max) * 100);
      return (
        <div style={{ height: 8, background: "#E0E0E0", borderRadius: 4, overflow: "hidden", marginBottom: 16 }}>
          <div style={{
            height: "100%",
            background: `linear-gradient(90deg, ${color} 0%, ${NAVY} 100%)`,
            width: `${pct}%`,
            transition: "width 0.4s ease"
          }} />
        </div>
      );
    }

    // ========== STUDY MODE ==========
    function StudyMode({ instrument, index, total, onNext, onPrev, onRestart, onJump }) {
      const [flipped, setFlipped] = useState(false);
      const [showCategoryNav, setShowCategoryNav] = useState(false);

      // Group instruments by category
      const grouped = useMemo(() => {
        const g = {};
        instruments.forEach((inst, i) => {
          if (!g[inst.category]) g[inst.category] = [];
          g[inst.category].push({ ...inst, idx: i });
        });
        return g;
      }, []);

      return (
        <div style={{ animation: "fadeIn 0.3s ease" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12, flexWrap: "wrap", gap: 8 }}>
            <span style={{ fontSize: 12, color: MED, fontWeight: 600 }}>{index + 1} of {total}</span>
            <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
              <CategoryBadge category={instrument.category} />
              <span style={{ fontSize: 10, fontWeight: 600, color: GOLD, background: CASE_BG, padding: "3px 12px", borderRadius: 12 }}>{instrument.session}</span>
            </div>
          </div>

          {/* Category quick-nav */}
          <div style={{ marginBottom: 12 }}>
            <button onClick={() => setShowCategoryNav(!showCategoryNav)}
              style={{
                background: "none", border: "none", color: TEAL, fontSize: 12,
                fontWeight: 600, cursor: "pointer", padding: "4px 0",
                display: "flex", alignItems: "center", gap: 4
              }}>
              <span style={{ transform: showCategoryNav ? "rotate(90deg)" : "rotate(0deg)", transition: "transform 0.2s", display: "inline-block" }}>\u25B6</span>
              Browse by Category
            </button>
            {showCategoryNav && (
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 8, animation: "slideIn 0.3s ease" }}>
                {Object.entries(grouped).map(([cat, items]) => (
                  <div key={cat} style={{ display: "flex", gap: 3 }}>
                    {items.map(item => (
                      <button key={item.idx} onClick={() => { setFlipped(false); onJump(item.idx); }}
                        style={{
                          width: 28, height: 28, borderRadius: "50%", border: `2px solid ${item.idx === index ? CATEGORY_COLORS[cat].color : "#E0E0E0"}`,
                          background: item.idx === index ? CATEGORY_COLORS[cat].bg : WHITE,
                          fontSize: 10, fontWeight: 700, color: CATEGORY_COLORS[cat].color,
                          cursor: "pointer", transition: "all 0.2s",
                          display: "flex", alignItems: "center", justifyContent: "center"
                        }}
                        title={item.name}
                      >{item.idx + 1}</button>
                    ))}
                  </div>
                ))}
              </div>
            )}
          </div>

          <ProgressBar value={index + 1} max={total} />

          {/* Flip card */}
          <div onClick={() => setFlipped(!flipped)}
            style={{
              perspective: "1000px",
              cursor: "pointer",
              minHeight: 340,
              marginBottom: 20
            }}>
            <div style={{
              background: WHITE,
              border: `2px solid ${flipped ? TEAL : "#E0E0E0"}`,
              borderRadius: 14,
              padding: 28,
              minHeight: 340,
              textAlign: "center",
              transition: "border-color 0.3s ease, box-shadow 0.3s ease",
              boxShadow: flipped ? `0 4px 20px rgba(42,157,143,0.15)` : "0 1px 6px rgba(0,0,0,0.06)",
              animation: "flipIn 0.4s ease"
            }}>
              {!flipped ? (
                <>
                  <div style={{ marginBottom: 20, display: "flex", justifyContent: "center" }}>
                    <InstrumentBadge name={instrument.name} category={instrument.category} size={64} />
                  </div>
                  <div style={{ marginBottom: 8 }}>
                    <CategoryBadge category={instrument.category} size="lg" />
                  </div>
                  <div style={{ fontSize: 24, fontWeight: 800, color: NAVY, marginBottom: 14, letterSpacing: -0.3 }}>{instrument.name}</div>
                  <div style={{ fontSize: 14, color: MED, marginBottom: 20, lineHeight: 1.7, maxWidth: 520, margin: "0 auto 20px" }}>{instrument.desc}</div>
                  <div style={{
                    fontSize: 12, color: TEAL, fontWeight: 600, animation: "pulse 2s ease infinite",
                    display: "flex", alignItems: "center", justifyContent: "center", gap: 6
                  }}>
                    <span style={{ display: "inline-block", transition: "transform 0.3s" }}>\u{1F504}</span> Tap to see clinical use & pro tip
                  </div>
                </>
              ) : (
                <div style={{ animation: "flipIn 0.35s ease" }}>
                  <div style={{ marginBottom: 12, display: "flex", justifyContent: "center" }}>
                    <InstrumentBadge name={instrument.name} category={instrument.category} size={48} />
                  </div>
                  <div style={{ fontSize: 20, fontWeight: 800, color: NAVY, marginBottom: 16 }}>{instrument.name}</div>
                  <div style={{ textAlign: "left", maxWidth: 520, margin: "0 auto" }}>
                    <div style={{
                      marginBottom: 16, padding: 14, background: TEAL_BG, borderRadius: 10,
                      borderLeft: `4px solid ${TEAL}`, boxShadow: "0 1px 4px rgba(42,157,143,0.1)"
                    }}>
                      <div style={{ fontSize: 11, fontWeight: 800, color: TEAL, marginBottom: 6, textTransform: "uppercase", letterSpacing: 1 }}>Clinical Use</div>
                      <div style={{ fontSize: 14, color: DARK, lineHeight: 1.7 }}>{instrument.use}</div>
                    </div>
                    <div style={{
                      marginBottom: 16, padding: 14, background: CASE_BG, borderRadius: 10,
                      borderLeft: `4px solid ${GOLD}`, boxShadow: "0 1px 4px rgba(212,168,67,0.1)"
                    }}>
                      <div style={{ fontSize: 11, fontWeight: 800, color: GOLD, marginBottom: 6, textTransform: "uppercase", letterSpacing: 1 }}>\u{1FA7A} Surgeon's Tip</div>
                      <div style={{ fontSize: 14, color: DARK, lineHeight: 1.7, fontStyle: "italic" }}>{instrument.funFact}</div>
                    </div>
                  </div>
                  <div style={{ fontSize: 12, color: TEAL, fontWeight: 600, marginTop: 12 }}>\u{1F504} Tap to flip back</div>
                </div>
              )}
            </div>
          </div>

          <div style={{ display: "flex", justifyContent: "space-between", gap: 8, flexWrap: "wrap" }}>
            <button onClick={() => { setFlipped(false); onPrev(); }} disabled={index === 0}
              style={{
                background: index === 0 ? "#E0E0E0" : LIGHT_BG,
                border: "none", borderRadius: 10, padding: "12px 22px",
                fontSize: 13, fontWeight: 600, color: index === 0 ? "#BBB" : NAVY,
                cursor: index === 0 ? "default" : "pointer", transition: "all 0.2s"
              }}>\u2190 Previous</button>
            <button onClick={onRestart}
              style={{
                background: WHITE, border: `2px solid ${NAVY}`, borderRadius: 10,
                padding: "12px 22px", fontSize: 13, fontWeight: 600, color: NAVY,
                cursor: "pointer", transition: "all 0.2s"
              }}>Start Over</button>
            <button onClick={() => { setFlipped(false); onNext(); }} disabled={index === total - 1}
              style={{
                background: index === total - 1 ? "#E0E0E0" : `linear-gradient(135deg, ${TEAL}, ${TEAL_DARK})`,
                border: "none", borderRadius: 10, padding: "12px 22px",
                fontSize: 13, fontWeight: 600, color: index === total - 1 ? "#BBB" : WHITE,
                cursor: index === total - 1 ? "default" : "pointer", transition: "all 0.2s"
              }}>Next \u2192</button>
          </div>
        </div>
      );
    }

    // ========== QUIZ MODE ==========
    function QuizMode({ onComplete, onRestart }) {
      const [questionIdx, setQuestionIdx] = useState(0);
      const [score, setScore] = useState(0);
      const [streak, setStreak] = useState(0);
      const [bestStreak, setBestStreak] = useState(0);
      const [selected, setSelected] = useState(null);
      const [showAnswer, setShowAnswer] = useState(false);
      const [answered, setAnswered] = useState(0);
      const [results, setResults] = useState([]);
      const [questions] = useState(() => {
        const shuffled = [...instruments].sort(() => Math.random() - 0.5);
        return shuffled.map(inst => {
          const wrong = instruments.filter(i => i.name !== inst.name).sort(() => Math.random() - 0.5).slice(0, 3);
          const options = [inst, ...wrong].sort(() => Math.random() - 0.5);
          const questionTypes = [
            { q: `Which instrument is described as: "${inst.desc.split('.')[0]}"?`, type: "desc" },
            { q: `Which instrument is used for: "${inst.use.split('.')[0]}"?`, type: "use" },
          ];
          const qt = questionTypes[Math.floor(Math.random() * questionTypes.length)];
          return { correct: inst, options, question: qt.q };
        });
      });

      const total = Math.min(10, questions.length);
      const q = questions[questionIdx];

      const handleSelect = (inst) => {
        if (showAnswer) return;
        setSelected(inst.name);
        setShowAnswer(true);
        const isCorrect = inst.name === q.correct.name;
        const newResults = [...results, { correct: q.correct, chosen: inst, isCorrect }];
        setResults(newResults);
        if (isCorrect) {
          const newStreak = streak + 1;
          setScore(s => s + 1);
          setStreak(newStreak);
          if (newStreak > bestStreak) setBestStreak(newStreak);
        } else {
          setStreak(0);
        }
      };

      const handleNext = () => {
        const newAnswered = answered + 1;
        setAnswered(newAnswered);
        if (questionIdx >= total - 1) {
          onComplete({ score, total, bestStreak, results });
          return;
        }
        setQuestionIdx(i => i + 1);
        setSelected(null);
        setShowAnswer(false);
      };

      return (
        <div style={{ animation: "fadeIn 0.3s ease" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12, flexWrap: "wrap", gap: 8 }}>
            <span style={{ fontSize: 13, color: MED, fontWeight: 600 }}>Question {questionIdx + 1}/{total}</span>
            <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
              <span style={{ fontSize: 13, color: TEAL, fontWeight: 700 }}>Score: {score}</span>
              {streak > 1 && (
                <span style={{
                  fontSize: 12, fontWeight: 700, color: GOLD,
                  background: CASE_BG, padding: "4px 12px", borderRadius: 12,
                  animation: "streakGlow 2s infinite",
                  border: `1px solid ${GOLD}40`
                }}>\u{1F525} {streak} streak!</span>
              )}
            </div>
          </div>

          <ProgressBar value={questionIdx + 1} max={total} />

          <div style={{
            background: CASE_BG, border: "1px solid #E6D280", borderRadius: 14, padding: 18, marginBottom: 16,
            boxShadow: "0 1px 6px rgba(0,0,0,0.06)"
          }}>
            <p style={{ fontSize: 14, color: DARK, margin: 0, lineHeight: 1.7 }}>{q.question}</p>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 10, marginBottom: 16 }}>
            {q.options.map((opt) => {
              const isCorrect = opt.name === q.correct.name;
              const isSelected = selected === opt.name;
              let bg = WHITE, border = "#E0E0E0", color = DARK;
              let extraStyle = {};
              if (showAnswer) {
                if (isCorrect) {
                  bg = TEAL_BG; border = TEAL; color = TEAL;
                  extraStyle = { animation: "correctGlow 0.6s ease", boxShadow: `0 0 12px rgba(42,157,143,0.25)` };
                } else if (isSelected) {
                  bg = ALERT_BG; border = "#C0392B"; color = "#C0392B";
                  extraStyle = { animation: "shake 0.5s ease" };
                }
              }
              return (
                <button key={opt.name} onClick={() => handleSelect(opt)}
                  style={{
                    padding: 14, borderRadius: 14,
                    border: `2px solid ${border}`, background: bg,
                    cursor: showAnswer ? "default" : "pointer",
                    textAlign: "center", transition: "all 0.2s",
                    boxShadow: "0 1px 6px rgba(0,0,0,0.06)",
                    ...extraStyle
                  }}>
                  <div style={{ marginBottom: 8, display: "flex", justifyContent: "center" }}>
                    <InstrumentBadge name={opt.name} category={opt.category} size={40} />
                  </div>
                  <div style={{ fontSize: 12, fontWeight: 600, color, lineHeight: 1.3 }}>{opt.name}</div>
                  {showAnswer && isCorrect && (
                    <div style={{ marginTop: 6 }}>
                      <CategoryBadge category={opt.category} />
                    </div>
                  )}
                </button>
              );
            })}
          </div>

          {showAnswer && (
            <div style={{ animation: "slideIn 0.3s ease" }}>
              <div style={{
                padding: 14, borderRadius: 14, fontSize: 14, fontWeight: 600,
                background: selected === q.correct.name ? TEAL_BG : ALERT_BG,
                color: selected === q.correct.name ? TEAL : "#C0392B",
                marginBottom: 12, animation: "scorePop 0.4s ease",
                border: `1px solid ${selected === q.correct.name ? TEAL + '40' : '#C0392B40'}`,
                boxShadow: "0 1px 6px rgba(0,0,0,0.06)"
              }}>
                {selected === q.correct.name
                  ? (streak > 2 ? `\u{1F525} Correct! ${streak} in a row!` : "\u2705 Correct!")
                  : `\u274C The answer was: ${q.correct.name}`}
              </div>

              {/* Surgeon's Tip after answer */}
              <div style={{
                padding: 12, background: CASE_BG, borderRadius: 10, marginBottom: 12,
                borderLeft: `4px solid ${GOLD}`, fontSize: 12, color: MED, lineHeight: 1.6
              }}>
                <strong style={{ color: GOLD }}>\u{1FA7A} Surgeon's Tip:</strong> {q.correct.funFact}
              </div>

              {!results[results.length - 1]?.isCorrect && (
                <div style={{ padding: 10, background: LIGHT_BG, borderRadius: 10, marginBottom: 12, fontSize: 12, color: MED, lineHeight: 1.5 }}>
                  <strong style={{ color: NAVY }}>Remember:</strong> {q.correct.desc.split('.')[0]}.
                </div>
              )}
              <div style={{ display: "flex", gap: 10 }}>
                <button onClick={onRestart}
                  style={{
                    flex: 1, background: WHITE, border: `2px solid ${NAVY}`, borderRadius: 10,
                    padding: "12px", fontSize: 13, fontWeight: 700, color: NAVY,
                    cursor: "pointer", transition: "all 0.2s"
                  }}>Restart</button>
                <button onClick={handleNext}
                  style={{
                    flex: 2, background: `linear-gradient(135deg, ${TEAL}, ${TEAL_DARK})`,
                    color: WHITE, border: "none", borderRadius: 10,
                    padding: "12px", fontSize: 13, fontWeight: 700,
                    cursor: "pointer", transition: "all 0.2s",
                    boxShadow: "0 2px 8px rgba(42,157,143,0.3)"
                  }}>{questionIdx >= total - 1 ? "See Results \u2192" : "Next Question \u2192"}</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ========== SPEED ROUND ==========
    function SpeedRound({ onComplete, onRestart }) {
      const [questionIdx, setQuestionIdx] = useState(0);
      const [score, setScore] = useState(0);
      const [streak, setStreak] = useState(0);
      const [timeLeft, setTimeLeft] = useState(60);
      const [started, setStarted] = useState(false);
      const [finished, setFinished] = useState(false);
      const [lastCorrect, setLastCorrect] = useState(null);
      const [totalAnswered, setTotalAnswered] = useState(0);
      const [combo, setCombo] = useState(1);
      const timerRef = useRef(null);
      const scoreRef = useRef(0);
      const streakRef = useRef(0);
      const answeredRef = useRef(0);
      const [questions] = useState(() => {
        const shuffled = [...instruments].sort(() => Math.random() - 0.5);
        return shuffled.map(inst => {
          const wrong = instruments.filter(i => i.name !== inst.name).sort(() => Math.random() - 0.5).slice(0, 3);
          const options = [inst, ...wrong].sort(() => Math.random() - 0.5);
          return { correct: inst, options };
        });
      });

      const startSpeed = () => {
        setStarted(true);
        setScore(0);
        scoreRef.current = 0;
        streakRef.current = 0;
        answeredRef.current = 0;
        setStreak(0);
        setCombo(1);
        setQuestionIdx(0);
        setTimeLeft(60);
        setTotalAnswered(0);
        setFinished(false);
        setLastCorrect(null);
        timerRef.current = setInterval(() => {
          setTimeLeft(t => {
            if (t <= 1) {
              clearInterval(timerRef.current);
              setFinished(true);
              onComplete({ score: scoreRef.current, streak: streakRef.current, timeSpent: 60, answered: answeredRef.current });
              return 0;
            }
            return t - 1;
          });
        }, 1000);
      };

      useEffect(() => {
        return () => { if (timerRef.current) clearInterval(timerRef.current); };
      }, []);

      const handleAnswer = (inst) => {
        if (finished) return;
        const isCorrect = inst.name === questions[questionIdx % questions.length].correct.name;
        setLastCorrect(isCorrect);
        answeredRef.current += 1;
        setTotalAnswered(answeredRef.current);
        if (isCorrect) {
          const newStreak = streakRef.current + 1;
          const multiplier = newStreak >= 5 ? 3 : newStreak >= 3 ? 2 : 1;
          const pts = multiplier;
          scoreRef.current += pts;
          streakRef.current = newStreak;
          setScore(scoreRef.current);
          setStreak(newStreak);
          setCombo(multiplier);
        } else {
          streakRef.current = 0;
          setStreak(0);
          setCombo(1);
        }
        const nextIdx = (questionIdx + 1) % questions.length;
        setQuestionIdx(nextIdx);
        setTimeout(() => setLastCorrect(null), 400);
      };

      if (!started) {
        return (
          <div style={{ textAlign: "center", animation: "fadeIn 0.3s ease" }}>
            <div style={{
              background: `linear-gradient(135deg, ${CASE_BG}, #FFF3D0)`,
              border: `2px solid ${GOLD}`,
              borderRadius: 14, padding: 28, marginBottom: 20,
              boxShadow: "0 4px 16px rgba(212,168,67,0.15)"
            }}>
              <div style={{ fontSize: 40, marginBottom: 12 }}>\u26A1</div>
              <div style={{ fontSize: 20, fontWeight: 800, color: NAVY, marginBottom: 12 }}>Speed Round</div>
              <p style={{ fontSize: 14, color: MED, marginBottom: 16, lineHeight: 1.7 }}>
                Identify instruments as fast as you can! You have <strong>60 seconds</strong>.
              </p>
              <div style={{ display: "flex", justifyContent: "center", gap: 16, marginBottom: 16, flexWrap: "wrap" }}>
                <div style={{ background: WHITE, borderRadius: 10, padding: "10px 16px", border: `1px solid ${TEAL}30` }}>
                  <div style={{ fontSize: 10, color: MED, fontWeight: 600, marginBottom: 2 }}>3+ STREAK</div>
                  <div style={{ fontSize: 16, fontWeight: 800, color: TEAL }}>2x Points</div>
                </div>
                <div style={{ background: WHITE, borderRadius: 10, padding: "10px 16px", border: `1px solid ${GOLD}30` }}>
                  <div style={{ fontSize: 10, color: MED, fontWeight: 600, marginBottom: 2 }}>5+ STREAK</div>
                  <div style={{ fontSize: 16, fontWeight: 800, color: GOLD }}>3x Points</div>
                </div>
              </div>
              <div style={{ fontSize: 48, fontWeight: 800, color: GOLD, marginBottom: 4 }}>60<span style={{ fontSize: 20 }}>s</span></div>
            </div>
            <button onClick={startSpeed}
              style={{
                background: `linear-gradient(135deg, ${GOLD}, #C4962E)`,
                color: WHITE, border: "none", borderRadius: 14,
                padding: "16px 40px", fontSize: 17, fontWeight: 700,
                cursor: "pointer", transition: "all 0.2s",
                boxShadow: "0 4px 12px rgba(212,168,67,0.35)",
                letterSpacing: 0.3
              }}>\u26A1 Start Speed Round</button>
          </div>
        );
      }

      const q = questions[questionIdx % questions.length];
      const isUrgent = timeLeft <= 10;
      const isWarning = timeLeft <= 20 && timeLeft > 10;
      const timerColor = isUrgent ? "#C0392B" : isWarning ? "#E67E22" : NAVY;

      // Timer circle
      const timerCircle = (
        <div style={{
          position: "relative",
          width: 60, height: 60,
          display: "flex", alignItems: "center", justifyContent: "center"
        }}>
          <svg width="60" height="60" viewBox="0 0 60 60" style={{ transform: "rotate(-90deg)", position: "absolute" }}>
            <circle cx="30" cy="30" r="26" fill="none" stroke="#E0E0E0" strokeWidth="4" />
            <circle cx="30" cy="30" r="26" fill="none" stroke={timerColor} strokeWidth="4"
              strokeDasharray={`${2 * Math.PI * 26}`}
              strokeDashoffset={`${2 * Math.PI * 26 * (1 - timeLeft / 60)}`}
              strokeLinecap="round"
              style={{ transition: "stroke-dashoffset 1s linear, stroke 0.3s" }}
            />
          </svg>
          <div style={{
            fontSize: 18, fontWeight: 800, fontVariantNumeric: "tabular-nums",
            color: timerColor,
            animation: isUrgent ? "countdownPulse 0.5s infinite" : "none",
            zIndex: 1
          }}>{timeLeft}</div>
        </div>
      );

      return (
        <div style={{ animation: "fadeIn 0.3s ease" }}>
          <div style={{
            display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12,
            flexWrap: "wrap", gap: 8
          }}>
            {timerCircle}
            <div style={{ display: "flex", gap: 12, alignItems: "center", flexWrap: "wrap" }}>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontSize: 10, color: MED, fontWeight: 600 }}>SCORE</div>
                <div style={{ fontSize: 22, fontWeight: 800, color: TEAL }}>{score}</div>
              </div>
              {combo > 1 && (
                <span style={{
                  fontSize: 14, fontWeight: 800, color: combo >= 3 ? GOLD : TEAL,
                  background: combo >= 3 ? CASE_BG : TEAL_BG,
                  padding: "6px 14px", borderRadius: 14,
                  animation: "comboFlash 0.4s ease",
                  border: `2px solid ${combo >= 3 ? GOLD : TEAL}`
                }}>{combo}x</span>
              )}
              {streak >= 3 && (
                <span style={{
                  fontSize: 12, fontWeight: 700, color: GOLD,
                  background: CASE_BG, padding: "4px 12px", borderRadius: 12,
                  animation: "streakGlow 1s infinite"
                }}>\u{1F525} {streak} streak!</span>
              )}
            </div>
          </div>

          {/* Urgency bar */}
          <div style={{
            height: 6, borderRadius: 3, overflow: "hidden", marginBottom: 16,
            background: isUrgent
              ? "linear-gradient(90deg, #C0392B, #E74C3C, #C0392B)"
              : "#E0E0E0",
            backgroundSize: isUrgent ? "200% 100%" : "auto",
            animation: isUrgent ? "timerUrgent 0.5s ease infinite" : "none"
          }}>
            <div style={{
              height: "100%",
              background: `linear-gradient(90deg, ${timerColor}, ${isUrgent ? '#E74C3C' : NAVY})`,
              width: `${(timeLeft / 60) * 100}%`,
              transition: "width 1s linear"
            }} />
          </div>

          {finished ? (
            <div style={{ textAlign: "center", animation: "slideIn 0.4s ease" }}>
              <div style={{
                background: score >= 15 ? TEAL_BG : score >= 8 ? CASE_BG : ALERT_BG,
                border: `2px solid ${score >= 15 ? TEAL : score >= 8 ? GOLD : "#C0392B"}`,
                borderRadius: 14, padding: 28, marginBottom: 16,
                boxShadow: "0 4px 16px rgba(0,0,0,0.08)"
              }}>
                <div style={{ fontSize: 14, color: MED, marginBottom: 8 }}>Final Score</div>
                <div style={{
                  fontSize: 48, fontWeight: 800,
                  color: score >= 15 ? TEAL : score >= 8 ? GOLD : "#C0392B",
                  animation: "scorePop 0.5s ease"
                }}>
                  {score}
                </div>
                <div style={{ fontSize: 13, color: MED, marginTop: 4 }}>points</div>
                <div style={{
                  display: "flex", justifyContent: "center", gap: 20, marginTop: 16
                }}>
                  <div>
                    <div style={{ fontSize: 10, color: MED, fontWeight: 600 }}>ANSWERED</div>
                    <div style={{ fontSize: 18, fontWeight: 800, color: NAVY }}>{totalAnswered}</div>
                  </div>
                  <div>
                    <div style={{ fontSize: 10, color: MED, fontWeight: 600 }}>BEST STREAK</div>
                    <div style={{ fontSize: 18, fontWeight: 800, color: GOLD }}>{streak}</div>
                  </div>
                </div>
                <div style={{ fontSize: 16, fontWeight: 700, color: score >= 15 ? TEAL : score >= 8 ? GOLD : "#C0392B", marginTop: 12 }}>
                  {score >= 20 ? "Incredible! Attending-level speed!" : score >= 15 ? "Outstanding! Surgical-level recall!" : score >= 8 ? "Good speed! Keep practicing!" : "Room to improve. Try the study cards first!"}
                </div>
              </div>
              <button onClick={() => { setStarted(false); }}
                style={{
                  width: "100%", background: `linear-gradient(135deg, ${NAVY}, #0F2340)`,
                  color: WHITE, border: "none", borderRadius: 14,
                  padding: "14px", fontSize: 14, fontWeight: 700, cursor: "pointer",
                  boxShadow: "0 2px 8px rgba(27,58,92,0.3)"
                }}>\u{1F504} Try Again</button>
            </div>
          ) : (
            <>
              {/* Flash feedback overlay */}
              {lastCorrect !== null && (
                <div style={{
                  position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
                  background: lastCorrect ? "rgba(42,157,143,0.08)" : "rgba(192,57,43,0.08)",
                  pointerEvents: "none", zIndex: 100,
                  animation: "fadeIn 0.1s ease"
                }} />
              )}

              <div style={{
                background: WHITE, borderRadius: 14, padding: 18, marginBottom: 14,
                border: `2px solid ${lastCorrect === true ? TEAL : lastCorrect === false ? "#C0392B" : "#E0E0E0"}`,
                textAlign: "center", transition: "border-color 0.2s",
                boxShadow: lastCorrect === true ? `0 0 16px rgba(42,157,143,0.2)` :
                           lastCorrect === false ? `0 0 16px rgba(192,57,43,0.2)` :
                           "0 1px 6px rgba(0,0,0,0.06)",
                animation: lastCorrect === false ? "shake 0.4s ease" : "none"
              }}>
                <div style={{ marginBottom: 8, display: "flex", justifyContent: "center" }}>
                  <InstrumentBadge name={q.correct.name} category={q.correct.category} size={44} />
                </div>
                <div style={{ marginBottom: 6 }}>
                  <CategoryBadge category={q.correct.category} />
                </div>
                <div style={{ fontSize: 13, fontWeight: 600, color: MED, lineHeight: 1.5 }}>
                  {q.correct.desc.split('.')[0]}
                </div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 8 }}>
                {q.options.map(opt => (
                  <button key={opt.name} onClick={() => handleAnswer(opt)}
                    style={{
                      padding: 14, borderRadius: 14, border: "2px solid #E0E0E0",
                      background: WHITE, cursor: "pointer", textAlign: "center",
                      fontSize: 12, fontWeight: 600, color: DARK, transition: "all 0.15s",
                      boxShadow: "0 1px 6px rgba(0,0,0,0.06)"
                    }}
                    onMouseEnter={e => { e.currentTarget.style.borderColor = TEAL; e.currentTarget.style.background = TEAL_BG; e.currentTarget.style.transform = "translateY(-1px)"; }}
                    onMouseLeave={e => { e.currentTarget.style.borderColor = "#E0E0E0"; e.currentTarget.style.background = WHITE; e.currentTarget.style.transform = "translateY(0)"; }}
                  >{opt.name}</button>
                ))}
              </div>
            </>
          )}
        </div>
      );
    }

    // ========== RESULTS SCREEN ==========
    function ResultsScreen({ data, onRestart, onHome, personalBest }) {
      const { score, total, bestStreak, results } = data;
      const pct = Math.round((score / total) * 100);
      const color = pct >= 80 ? TEAL : pct >= 60 ? GOLD : "#C0392B";
      const label = pct >= 90 ? "Surgical Expert!" : pct >= 80 ? "Excellent Knowledge!" : pct >= 60 ? "Good Progress!" : "Keep Studying!";

      const catStats = {};
      results.forEach(r => {
        const cat = r.correct.category;
        if (!catStats[cat]) catStats[cat] = { correct: 0, total: 0 };
        catStats[cat].total++;
        if (r.isCorrect) catStats[cat].correct++;
      });

      const weakCategories = Object.entries(catStats)
        .filter(([, s]) => s.correct < s.total)
        .map(([cat]) => cat);

      return (
        <div style={{ animation: "slideIn 0.5s ease" }}>
          <div style={{ textAlign: "center", marginBottom: 24 }}>
            <div style={{
              display: "inline-block", width: 120, height: 120, borderRadius: "50%",
              background: `conic-gradient(${color} ${pct}%, #E0E0E0 0%)`,
              padding: 8, marginBottom: 16
            }}>
              <div style={{
                width: "100%", height: "100%", borderRadius: "50%", background: WHITE,
                display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center"
              }}>
                <div style={{ fontSize: 32, fontWeight: 800, color, animation: "scorePop 0.6s ease" }}>{score}/{total}</div>
                <div style={{ fontSize: 11, color: MED }}>{pct}%</div>
              </div>
            </div>
            <div style={{ fontSize: 20, fontWeight: 800, color, marginBottom: 4 }}>{label}</div>
            {bestStreak > 1 && <div style={{ fontSize: 13, color: GOLD, fontWeight: 600 }}>\u{1F525} Best streak: {bestStreak} in a row</div>}
            {personalBest !== null && <div style={{ fontSize: 12, color: MED, marginTop: 4 }}>Personal best: {personalBest}/{total}</div>}
          </div>

          {/* Question Breakdown */}
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: NAVY, marginBottom: 10 }}>Question Breakdown</div>
            {results.map((r, i) => (
              <div key={i} style={{
                display: "flex", alignItems: "center", gap: 10, padding: "8px 12px",
                background: i % 2 === 0 ? WHITE : LIGHT_BG, borderRadius: 8, marginBottom: 2
              }}>
                <span style={{
                  width: 24, height: 24, borderRadius: "50%", fontSize: 12, fontWeight: 700,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  background: r.isCorrect ? TEAL_BG : ALERT_BG,
                  color: r.isCorrect ? TEAL : "#C0392B"
                }}>{r.isCorrect ? "\u2713" : "\u2717"}</span>
                <div style={{ flex: 1, fontSize: 12, color: DARK }}>{r.correct.name}</div>
                {!r.isCorrect && <div style={{ fontSize: 11, color: "#C0392B" }}>You: {r.chosen.name}</div>}
              </div>
            ))}
          </div>

          {/* Category Performance */}
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: NAVY, marginBottom: 10 }}>Category Performance</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(130px, 1fr))", gap: 8 }}>
              {Object.entries(catStats).map(([cat, stats]) => {
                const catPct = Math.round((stats.correct / stats.total) * 100);
                const catColor = catPct === 100 ? TEAL : catPct >= 50 ? GOLD : "#C0392B";
                const catInfo = CATEGORY_COLORS[cat] || {};
                return (
                  <div key={cat} style={{
                    background: WHITE, border: `2px solid ${catColor}`, borderRadius: 14,
                    padding: 12, textAlign: "center", boxShadow: "0 1px 6px rgba(0,0,0,0.06)"
                  }}>
                    <div style={{ fontSize: 16, marginBottom: 4 }}>{catInfo.icon || ""}</div>
                    <div style={{ fontSize: 11, fontWeight: 700, color: catColor, marginBottom: 4 }}>{cat}</div>
                    <div style={{ fontSize: 18, fontWeight: 800, color: catColor }}>{stats.correct}/{stats.total}</div>
                  </div>
                );
              })}
            </div>
          </div>

          {weakCategories.length > 0 && (
            <div style={{
              background: CASE_BG, border: `1px solid ${GOLD}`, borderRadius: 14,
              padding: 14, marginBottom: 16, fontSize: 13, color: DARK,
              boxShadow: "0 1px 6px rgba(0,0,0,0.06)"
            }}>
              <strong>\u{1F4A1} Areas to review:</strong> {weakCategories.join(", ")} instruments. Try the Study Cards for these categories!
            </div>
          )}

          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={onHome}
              style={{
                flex: 1, background: WHITE, border: `2px solid ${NAVY}`, borderRadius: 14,
                padding: "14px", fontSize: 13, fontWeight: 700, color: NAVY, cursor: "pointer"
              }}>Home</button>
            <button onClick={onRestart}
              style={{
                flex: 2, background: `linear-gradient(135deg, ${TEAL}, ${TEAL_DARK})`,
                color: WHITE, border: "none", borderRadius: 14,
                padding: "14px", fontSize: 14, fontWeight: 700, cursor: "pointer",
                boxShadow: "0 2px 8px rgba(42,157,143,0.3)"
              }}>Try Again</button>
          </div>
        </div>
      );
    }

    // ========== MAIN COMPONENT ==========
    function InstrumentIDGame() {
      const [mode, setMode] = useState(null);
      const [studyIdx, setStudyIdx] = useState(0);
      const [quizResults, setQuizResults] = useState(null);
      const [personalBest, setPersonalBest] = useState(null);
      const [speedBest, setSpeedBest] = useState(null);

      const handleQuizComplete = (data) => {
        setQuizResults(data);
        if (personalBest === null || data.score > personalBest) {
          setPersonalBest(data.score);
        }
      };

      const handleSpeedComplete = (data) => {
        if (speedBest === null || data.score > speedBest) {
          setSpeedBest(data.score);
        }
      };

      const resetQuiz = () => {
        setQuizResults(null);
        setMode("quiz");
      };

      const goHome = () => {
        setMode(null);
        setQuizResults(null);
        setStudyIdx(0);
      };

      return (
        <div style={{
          fontFamily: "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif",
          display: "flex", flexDirection: "column", minHeight: "100vh"
        }}>
          <AppHeader />

          <div style={{ maxWidth: 680, margin: "0 auto", padding: "20px 16px", flex: 1, width: "100%" }}>
            {/* Title area */}
            <div style={{ textAlign: "center", marginBottom: 20 }}>
              <h1 style={{ fontSize: 26, fontWeight: 900, color: NAVY, margin: "0 0 6px", letterSpacing: -0.5 }}>
                \u{1FA7A} Instrument ID Game
              </h1>
              <p style={{ fontSize: 14, color: MED, margin: 0 }}>Master surgical & diagnostic instruments</p>
            </div>

            {/* Persistent stats bar */}
            <div style={{
              display: "flex", justifyContent: "space-between", alignItems: "center",
              gap: 8, marginBottom: 18, padding: "10px 16px",
              background: WHITE, borderRadius: 14, boxShadow: "0 1px 6px rgba(0,0,0,0.06)",
              flexWrap: "wrap", border: "1px solid #E8E8E8"
            }}>
              <div style={{ display: "flex", gap: 16 }}>
                {personalBest !== null && (
                  <div>
                    <div style={{ fontSize: 10, color: MED, fontWeight: 600 }}>Quiz Best</div>
                    <div style={{ fontSize: 14, fontWeight: 800, color: TEAL }}>{personalBest}/10</div>
                  </div>
                )}
                {speedBest !== null && (
                  <div>
                    <div style={{ fontSize: 10, color: MED, fontWeight: 600 }}>Speed Best</div>
                    <div style={{ fontSize: 14, fontWeight: 800, color: GOLD }}>{speedBest} pts</div>
                  </div>
                )}
                {personalBest === null && speedBest === null && (
                  <div style={{ fontSize: 12, color: MED, display: "flex", alignItems: "center", gap: 6 }}>
                    <span style={{ fontSize: 14 }}>\u{1F52C}</span> 12 instruments to learn
                  </div>
                )}
              </div>
              {mode !== null && (
                <button onClick={goHome}
                  style={{
                    background: "none", border: `2px solid ${TEAL}`, color: TEAL,
                    borderRadius: 10, padding: "6px 14px", fontSize: 12, fontWeight: 700,
                    cursor: "pointer", transition: "all 0.2s"
                  }}>\u2190 Home</button>
              )}
            </div>

            {/* HOME / WELCOME SCREEN */}
            {mode === null && (
              <div style={{ animation: "fadeIn 0.4s ease" }}>
                {/* Instrument count by category */}
                <div style={{
                  display: "flex", flexWrap: "wrap", gap: 6, justifyContent: "center",
                  marginBottom: 20
                }}>
                  {categories.map(cat => {
                    const count = instruments.filter(i => i.category === cat).length;
                    const catInfo = CATEGORY_COLORS[cat] || {};
                    return (
                      <span key={cat} style={{
                        fontSize: 11, fontWeight: 600, color: catInfo.color,
                        background: catInfo.bg, padding: "4px 10px", borderRadius: 10,
                        border: `1px solid ${catInfo.color}20`,
                        display: "inline-flex", alignItems: "center", gap: 3
                      }}>
                        {catInfo.icon} {cat} ({count})
                      </span>
                    );
                  })}
                </div>

                <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                  {[
                    {
                      id: "study", icon: "\u{1F4DA}", title: "Study Cards",
                      desc: "Browse all 12 instruments with descriptions, uses, and surgeon's tips. Flip cards to learn!",
                      color: TEAL, gradient: `linear-gradient(135deg, ${TEAL}08, ${TEAL}15)`
                    },
                    {
                      id: "quiz", icon: "\u{1F9E0}", title: "Knowledge Quiz",
                      desc: "10-question quiz from descriptions and clinical uses. Build your streak!",
                      color: NAVY, gradient: `linear-gradient(135deg, ${NAVY}08, ${NAVY}15)`
                    },
                    {
                      id: "speed", icon: "\u26A1", title: "Speed Round",
                      desc: "60 seconds. How many can you identify? Combo multipliers for streaks!",
                      color: GOLD, gradient: `linear-gradient(135deg, ${GOLD}08, ${GOLD}15)`
                    },
                  ].map(m => (
                    <button key={m.id} onClick={() => { setMode(m.id); setQuizResults(null); setStudyIdx(0); }}
                      style={{
                        display: "flex", alignItems: "center", gap: 16, padding: 20,
                        background: WHITE, border: "2px solid #E0E0E0", borderRadius: 14,
                        cursor: "pointer", textAlign: "left", transition: "all 0.25s ease",
                        boxShadow: "0 1px 6px rgba(0,0,0,0.06)"
                      }}
                      onMouseEnter={e => { e.currentTarget.style.borderColor = m.color; e.currentTarget.style.background = m.gradient; e.currentTarget.style.transform = "translateY(-2px)"; e.currentTarget.style.boxShadow = `0 4px 12px ${m.color}20`; }}
                      onMouseLeave={e => { e.currentTarget.style.borderColor = "#E0E0E0"; e.currentTarget.style.background = WHITE; e.currentTarget.style.transform = "translateY(0)"; e.currentTarget.style.boxShadow = "0 1px 6px rgba(0,0,0,0.06)"; }}
                    >
                      <div style={{
                        fontSize: 32, width: 56, height: 56, display: "flex",
                        alignItems: "center", justifyContent: "center",
                        background: `${m.color}10`, borderRadius: 14,
                        border: `2px solid ${m.color}20`
                      }}>{m.icon}</div>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontWeight: 700, color: NAVY, fontSize: 16, marginBottom: 4 }}>{m.title}</div>
                        <div style={{ fontSize: 12, color: MED, lineHeight: 1.5 }}>{m.desc}</div>
                      </div>
                      <div style={{ color: m.color, fontSize: 18, fontWeight: 700 }}>\u203A</div>
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* STUDY MODE */}
            {mode === "study" && (
              <StudyMode
                instrument={instruments[studyIdx]}
                index={studyIdx}
                total={instruments.length}
                onNext={() => setStudyIdx(i => Math.min(i + 1, instruments.length - 1))}
                onPrev={() => setStudyIdx(i => Math.max(i - 1, 0))}
                onRestart={() => setStudyIdx(0)}
                onJump={(idx) => setStudyIdx(idx)}
              />
            )}

            {/* QUIZ MODE */}
            {mode === "quiz" && !quizResults && (
              <QuizMode onComplete={handleQuizComplete} onRestart={resetQuiz} />
            )}
            {mode === "quiz" && quizResults && (
              <ResultsScreen
                data={quizResults}
                onRestart={resetQuiz}
                onHome={goHome}
                personalBest={personalBest}
              />
            )}

            {/* SPEED ROUND */}
            {mode === "speed" && (
              <SpeedRound onComplete={handleSpeedComplete} onRestart={() => setMode("speed")} />
            )}
          </div>

          <AppFooter />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<InstrumentIDGame />);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instrument ID Game - Woven Learning Mini Med School</title>
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.9/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #F0F4F8; min-height: 100vh; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }
    @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
    @keyframes correctFlash { 0% { box-shadow: 0 0 0 0 rgba(39,174,96,0.4); } 100% { box-shadow: 0 0 0 20px rgba(39,174,96,0); } }
    @keyframes timerPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
    @keyframes countIn { from { transform: scale(2); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    .slide-up { animation: slideUp 0.4s ease-out; }
    .shake { animation: shake 0.35s ease; }
    .correct-flash { animation: correctFlash 0.5s ease-out; }
    .timer-pulse { animation: timerPulse 0.8s ease infinite; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    const NAVY = "#1B3A5C";
    const TEAL = "#2A9D8F";
    const TEAL_DARK = "#1A6B6B";
    const GOLD = "#D4A843";
    const WHITE = "#FFFFFF";
    const RED = "#C0392B";
    const GREEN = "#27AE60";
    const DARK = "#333";
    const MED = "#667";
    const CARD_R = 14;
    const SHADOW = "0 2px 10px rgba(0,0,0,0.08)";

    const CAT = {
      Cutting:       { color: "#C0392B", bg: "#FFF0EE", icon: "\u2702\uFE0F" },
      Suturing:      { color: "#8E44AD", bg: "#F8F0FD", icon: "\u{1FAA1}" },
      Grasping:      { color: "#2980B9", bg: "#EBF5FB", icon: "\u{1F91B}" },
      Clamping:      { color: "#D35400", bg: "#FFF3E8", icon: "\u{1F517}" },
      Exposure:      { color: "#16A085", bg: "#E8FBF5", icon: "\u{1F50D}" },
      Laparoscopic:  { color: "#2C3E50", bg: "#EDF0F2", icon: "\u{1F3AE}" },
      Diagnostic:    { color: "#2A9D8F", bg: "#E8F5F2", icon: "\u{1FA7A}" },
    };

    const instruments = [
      {
        name: "Scalpel (#10 Blade)",
        category: "Cutting",
        grip: "Violin bow grip for long incisions, pencil grip for precision",
        desc: "The surgeon's primary cutting tool. The #10 blade has a large, curved cutting edge designed for making skin incisions through the dermis.",
        use: "First instrument used in most surgeries. Makes the initial incision to access the surgical site. The curve lets you rock the blade through tissue in a single smooth motion.",
        tip: "Blades dull fast. Surgeons change them multiple times per case because a dull blade tears tissue instead of cutting it cleanly, causing more scarring.",
        session: "Session 3 & 4",
        svg: "M18 42L14 38L24 12L30 10L32 14L22 40Z M30 10L34 8L36 12L32 14Z"
      },
      {
        name: "Needle Driver",
        category: "Suturing",
        grip: "Thumb and ring finger in the rings, index finger on the shaft for stability",
        desc: "A locking clamp with short, flat, cross-hatched jaws designed to grip curved suture needles. The ratchet lock holds the needle securely so it won't spin during stitching.",
        use: "The most important suturing instrument. Drives curved needles through tissue at a precise angle. The lock lets you release and re-grip without losing the needle.",
        tip: "Never grip it with your whole fist. The thumb-ring-finger grip gives you wrist rotation for driving the needle in an arc that matches its curvature.",
        session: "Session 3",
        svg: "M10 38L18 22L22 22L26 18L30 18L22 34L18 34Z M26 18L42 8L44 12L30 22Z M22 22L18 18L22 14L26 18Z"
      },
      {
        name: "Tissue Forceps (Adson)",
        category: "Grasping",
        grip: "Pencil grip between thumb and index finger, pinch to close",
        desc: "Delicate tweezer-like instrument with small interlocking teeth at the tip (1x2 pattern). Spring-loaded: squeeze to grip, release to open.",
        use: "Stabilizes tissue while suturing. Lifts wound edges so the needle can pass through cleanly. The teeth grip without slipping, even on wet tissue.",
        tip: "The teeth actually cause LESS damage than smooth forceps because you don't have to squeeze as hard. Gentle pressure is all you need.",
        session: "Session 3",
        svg: "M22 8L24 8L26 38L25 42L24 42L23 42L22 38Z M22 38L20 42L21 44L23 42Z M26 38L28 42L27 44L25 42Z M21 8L19 6L21 4L23 6Z M27 8L29 6L27 4L25 6Z"
      },
      {
        name: "Hemostat (Kelly Clamp)",
        category: "Clamping",
        grip: "Thumb and ring finger in the rings, same as needle driver",
        desc: "A locking clamp with serrated (grooved) jaws but NO cutting edge. The ratchet mechanism locks in multiple positions for different clamping pressures.",
        use: "Clamps blood vessels to stop hemorrhage. Also holds tissue, secures drapes, and grabs small objects. The serrations prevent slipping on wet, bloody vessels.",
        tip: "Named after Howard Kelly, one of the 'Big Four' founders of Johns Hopkins Hospital. This clamp literally changed surgery by making hemorrhage control reliable.",
        session: "Session 4",
        svg: "M10 38L18 24L22 24L26 20L30 20L34 24L38 24L30 38Z M26 20L40 8L44 12L34 24Z M22 24L16 8L12 12L18 24Z"
      },
      {
        name: "Suture Scissors (Mayo)",
        category: "Cutting",
        grip: "Thumb and ring finger in the rings, use the tips only",
        desc: "Heavy-duty scissors with thick, slightly curved, blunt-tipped blades. Designed specifically to cut suture material cleanly without fraying the thread.",
        use: "Cuts suture threads after knots are tied. The blunt tips prevent accidental damage to nearby tissue. Only the very tips of the blades should contact the suture.",
        tip: "NEVER use suture scissors to cut anything else. Cutting tape, drapes, or bandages dulls the blades and ruins them. Dedicated scissors for dedicated purposes.",
        session: "Session 3 & 4",
        svg: "M12 36L20 24L24 24L28 20L32 24L36 24L28 36Z M28 20L38 8L42 12L32 24Z M20 24L14 8L10 12L16 24Z M24 22L24 26L24 24Z"
      },
      {
        name: "Retractor (Army-Navy)",
        category: "Exposure",
        grip: "Held by an assistant, one hand, pulling gently outward",
        desc: "A double-ended handheld retractor with a flat, curved blade at each end. One end is narrower (for tight spaces), the other wider (for larger incisions).",
        use: "Holds back tissue, muscle, or wound edges so the surgeon has a clear view of the operating field. An assistant holds it steady while the surgeon works below.",
        tip: "Called 'Army-Navy' because it was designed to work in both Army and Navy field hospitals. No moving parts, nothing to break, built to just work.",
        session: "Session 4",
        svg: "M16 6L20 6L20 14Q22 18 24 18Q26 18 28 14L28 6L32 6L32 14Q30 22 24 22Q18 22 16 14Z M16 42L20 42L20 34Q22 30 24 30Q26 30 28 34L28 42L32 42L32 34Q30 26 24 26Q18 26 16 34Z M22 22L22 26L26 26L26 22Z"
      },
      {
        name: "Laparoscopic Grasper",
        category: "Laparoscopic",
        grip: "Pistol grip with trigger mechanism for jaw control",
        desc: "A 30+ cm instrument with a pistol-grip handle and small articulating jaws at the tip. Inserted through a trocar port during minimally invasive surgery.",
        use: "Grasps and manipulates organs and tissue inside the body cavity. The fulcrum effect at the port reverses every hand movement, making this deceptively difficult to use.",
        tip: "The fulcrum effect: move your hand LEFT and the tip goes RIGHT. Move DOWN and the tip goes UP. It takes hundreds of hours of practice to feel natural.",
        session: "Session 5",
        svg: "M22 42L20 36L12 34L10 30L14 28L22 30L24 8L26 6L28 8L26 30L34 28L38 30L36 34L28 36L26 42Z"
      },
      {
        name: "Trocar",
        category: "Laparoscopic",
        grip: "Palm grip on the handle, controlled downward thrust",
        desc: "A sharp-pointed obturator inside a hollow tube (cannula). Punctures the abdominal wall to create an access port for laparoscopic instruments and the camera.",
        use: "Creates the entry points for laparoscopic surgery. After puncturing through, the sharp trocar is removed and the cannula stays as a channel for instruments.",
        tip: "Modern safety trocars have a spring-loaded blade shield that covers the sharp tip the instant it passes through the abdominal wall, preventing organ injury.",
        session: "Session 5",
        svg: "M22 6L26 6L26 36L28 36L28 40L24 44L20 40L20 36L22 36Z M23 6L25 6L24 2Z"
      },
      {
        name: "Laparoscope (Camera)",
        category: "Laparoscopic",
        grip: "Held by camera assistant or robotic arm, rotated for different views",
        desc: "A rigid telescope with a camera and light source at the tip. Available in 0\u00B0 (straight ahead) and 30\u00B0 (angled) views. Transmits a magnified HD image to OR monitors.",
        use: "The surgeon's eyes during laparoscopic surgery. Everything they see comes through this camera. The 30\u00B0 scope lets you look around corners by rotating the shaft.",
        tip: "Keeping the camera steady and oriented correctly is a full-time job. A shaky camera means a shaky surgeon. Camera navigation is the first skill residents learn.",
        session: "Session 5",
        svg: "M20 8L28 8L30 12L30 38L28 42L20 42L18 38L18 12Z M22 4L26 4L28 8L20 8Z M20 42L18 44L16 42L18 38Z M28 42L30 44L32 42L30 38Z"
      },
      {
        name: "Pulse Oximeter",
        category: "Diagnostic",
        grip: "Clips onto the fingertip, no grip needed",
        desc: "A small clip-on sensor that measures blood oxygen saturation (SpO\u2082) and pulse rate by shining red and infrared light through the fingertip.",
        use: "Continuous, non-invasive monitoring of oxygen levels and heart rate. Normal SpO\u2082 is 95-100%. Below 92% is a medical concern requiring intervention.",
        tip: "Nail polish, cold fingers, and dark skin pigmentation can all affect readings. Always check the signal quality waveform before trusting the number.",
        session: "Session 1",
        svg: "M14 16L34 16L38 20L38 32L34 36L14 36L10 32L10 20Z M14 24L34 24 M18 18L18 22 M24 28L24 34 M28 28L28 34"
      },
      {
        name: "Sphygmomanometer",
        category: "Diagnostic",
        grip: "Wrap cuff around upper arm, inflate with the bulb",
        desc: "The blood pressure measurement system: an inflatable cuff, pressure gauge, inflation bulb, and release valve. Wraps around the upper arm above the elbow.",
        use: "Measures systolic and diastolic blood pressure by compressing the brachial artery. The cuff inflates to stop blood flow, then slowly deflates while you listen with a stethoscope for Korotkoff sounds.",
        tip: "The word comes from Greek: sphygmos (pulse) + manometer (pressure meter). Everyone just says 'BP cuff.' Using the wrong cuff size gives wrong readings.",
        session: "Session 1",
        svg: "M12 12L36 12L38 14L38 34L36 36L12 36L10 34L10 14Z M20 18L28 18L30 20L30 28L28 30L20 30L18 28L18 20Z M24 20L24 28 M20 24L28 24 M24 30L24 38L22 42L26 42L24 38"
      },
      {
        name: "Reflex Hammer",
        category: "Diagnostic",
        grip: "Hold loosely at the end of the handle, let it swing like a pendulum",
        desc: "A small hammer with a triangular rubber head on a weighted metal handle. Designed to elicit deep tendon reflexes with a gentle, controlled tap.",
        use: "Tests the patellar reflex (knee jerk) and other deep tendon reflexes. Assesses whether nerve pathways between the spinal cord and extremities are intact and functioning.",
        tip: "Let gravity do the work. If you grip it tight and swing hard, you get a worse reflex response AND hurt the patient. Loose grip, gentle pendulum swing.",
        session: "Session 1",
        svg: "M18 10L30 10L32 16L28 20L26 20L26 42L22 42L22 20L20 20L16 16Z"
      },
    ];

    const categories = [...new Set(instruments.map(i => i.category))];

    const InstrumentIcon = ({ svg, size = 48, color = NAVY }) => (
      <svg viewBox="0 0 48 48" width={size} height={size} style={{ flexShrink: 0 }}>
        <path d={svg} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
    );

    const WovenLogo = ({ size = 20 }) => (
      <svg viewBox="0 0 40 40" width={size} height={size} style={{ flexShrink: 0 }}>
        <polygon points="13,2 24,13 13,24 2,13" fill="#0ABAB5" opacity="0.85"/>
        <polygon points="27,2 38,13 27,24 16,13" fill="#F5B731" opacity="0.85"/>
        <polygon points="13,16 24,27 13,38 2,27" fill="#E65C3C" opacity="0.85"/>
        <polygon points="27,16 38,27 27,38 16,27" fill="#7A2D4E" opacity="0.85"/>
      </svg>
    );

    const AppHeader = ({ subtitle }) => (
      <div style={{
        background: "linear-gradient(135deg, #1B3A5C 0%, #2A9D8F 100%)",
        padding: "12px 20px",
        display: "flex", alignItems: "center", gap: 10,
        borderBottom: `3px solid ${GOLD}`
      }}>
        <WovenLogo size={24} />
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 15, fontWeight: 800, color: WHITE, letterSpacing: 0.3 }}>Mini Med School</div>
          <div style={{ fontSize: 11, color: "rgba(255,255,255,0.75)", fontWeight: 500 }}>{subtitle || "Surgical Instrument Identification"}</div>
        </div>
        <span style={{ fontSize: 20 }}>{"\u{1FA7A}"}</span>
      </div>
    );

    const AppFooter = () => (
      <div style={{
        textAlign: "center", padding: "14px 20px",
        borderTop: `3px solid ${GOLD}`, background: WHITE,
        fontSize: 11, color: "#999",
        display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
        marginTop: "auto"
      }}>
        <WovenLogo size={14} />
        <span>Built by <strong style={{ color: TEAL_DARK }}>Woven Learning & Technology</strong></span>
      </div>
    );

    const CatBadge = ({ category, size = "sm" }) => {
      const c = CAT[category] || { color: "#666", bg: "#EEE", icon: "" };
      const sm = size === "sm";
      return (
        <span style={{
          fontSize: sm ? 11 : 13, fontWeight: 700, color: c.color,
          background: c.bg, padding: sm ? "3px 10px" : "5px 14px", borderRadius: 12,
          display: "inline-flex", alignItems: "center", gap: 4,
          border: `1px solid ${c.color}20`
        }}>
          <span style={{ fontSize: sm ? 12 : 14 }}>{c.icon}</span> {category}
        </span>
      );
    };

    const Btn = ({ children, onClick, primary, style = {} }) => (
      <button onClick={onClick} style={{
        background: primary ? `linear-gradient(135deg, ${TEAL}, ${TEAL_DARK})` : WHITE,
        color: primary ? WHITE : NAVY,
        border: primary ? "none" : `2px solid ${TEAL}`,
        borderRadius: 10, padding: "11px 24px", fontSize: 14, fontWeight: 700,
        cursor: "pointer", transition: "all 0.2s",
        boxShadow: primary ? `0 2px 8px rgba(42,157,143,0.25)` : SHADOW,
        fontFamily: "inherit", ...style
      }}>
        {children}
      </button>
    );

    // ==================== STUDY MODE ====================
    function StudyMode({ onBack }) {
      const [idx, setIdx] = useState(0);
      const [filter, setFilter] = useState(null);
      const inst = useMemo(() => filter ? instruments.filter(i => i.category === filter) : instruments, [filter]);
      const item = inst[idx] || inst[0];
      const c = CAT[item.category];

      const nav = (dir) => setIdx(i => {
        const next = i + dir;
        if (next < 0) return inst.length - 1;
        if (next >= inst.length) return 0;
        return next;
      });

      return (
        <div className="fade-in">
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 16 }}>
            <button onClick={() => { setFilter(null); setIdx(0); }}
              style={{
                padding: "6px 14px", borderRadius: 20, fontSize: 11, fontWeight: 700, cursor: "pointer",
                border: !filter ? `2px solid ${TEAL}` : "2px solid #E0E0E0",
                background: !filter ? `${TEAL}15` : WHITE, color: !filter ? TEAL : MED,
                fontFamily: "inherit", transition: "all 0.2s"
              }}>All ({instruments.length})</button>
            {categories.map(cat => (
              <button key={cat} onClick={() => { setFilter(cat); setIdx(0); }}
                style={{
                  padding: "6px 14px", borderRadius: 20, fontSize: 11, fontWeight: 700, cursor: "pointer",
                  border: filter === cat ? `2px solid ${CAT[cat].color}` : "2px solid #E0E0E0",
                  background: filter === cat ? CAT[cat].bg : WHITE, color: filter === cat ? CAT[cat].color : MED,
                  fontFamily: "inherit", transition: "all 0.2s"
                }}>{CAT[cat].icon} {cat}</button>
            ))}
          </div>

          <div className="slide-up" key={item.name} style={{
            background: WHITE, borderRadius: CARD_R, overflow: "hidden",
            boxShadow: "0 4px 20px rgba(0,0,0,0.08)", border: `2px solid ${c.color}20`
          }}>
            <div style={{
              background: `linear-gradient(135deg, ${c.bg}, ${WHITE})`,
              padding: "28px 24px", textAlign: "center",
              borderBottom: `2px solid ${c.color}15`
            }}>
              <InstrumentIcon svg={item.svg} size={80} color={c.color} />
              <h2 style={{ fontSize: 20, fontWeight: 800, color: NAVY, margin: "12px 0 6px" }}>{item.name}</h2>
              <div style={{ display: "flex", gap: 8, justifyContent: "center", flexWrap: "wrap" }}>
                <CatBadge category={item.category} />
                <span style={{ fontSize: 11, fontWeight: 600, color: GOLD, background: "#FFF9E6", padding: "3px 12px", borderRadius: 12, border: `1px solid ${GOLD}30` }}>{item.session}</span>
              </div>
            </div>

            <div style={{ padding: "20px 24px" }}>
              <div style={{ marginBottom: 16 }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: MED, textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 6 }}>What It Is</div>
                <p style={{ fontSize: 14, color: DARK, lineHeight: 1.65, margin: 0 }}>{item.desc}</p>
              </div>

              <div style={{ marginBottom: 16 }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: MED, textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 6 }}>Clinical Use</div>
                <p style={{ fontSize: 14, color: DARK, lineHeight: 1.65, margin: 0 }}>{item.use}</p>
              </div>

              <div style={{
                background: "#F8F9FA", borderRadius: 10, padding: "12px 16px", marginBottom: 16,
                borderLeft: `4px solid ${c.color}`
              }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: c.color, textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 4 }}>How to Hold It</div>
                <p style={{ fontSize: 13, color: DARK, lineHeight: 1.6, margin: 0 }}>{item.grip}</p>
              </div>

              <div style={{
                background: "#FFF9E6", borderRadius: 10, padding: "12px 16px",
                borderLeft: `4px solid ${GOLD}`
              }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: "#8B6914", textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 4 }}>{"\u{1F48E}"} Surgeon's Tip</div>
                <p style={{ fontSize: 13, color: DARK, lineHeight: 1.6, margin: 0, fontStyle: "italic" }}>{item.tip}</p>
              </div>
            </div>
          </div>

          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 16 }}>
            <button onClick={() => nav(-1)} style={{
              width: 44, height: 44, borderRadius: "50%", border: `2px solid #E0E0E0`,
              background: WHITE, fontSize: 18, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
              fontFamily: "inherit", color: NAVY, transition: "all 0.2s"
            }}>{"\u2190"}</button>
            <span style={{ fontSize: 13, fontWeight: 700, color: MED }}>{idx + 1} of {inst.length}</span>
            <button onClick={() => nav(1)} style={{
              width: 44, height: 44, borderRadius: "50%", border: `2px solid #E0E0E0`,
              background: WHITE, fontSize: 18, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
              fontFamily: "inherit", color: NAVY, transition: "all 0.2s"
            }}>{"\u2192"}</button>
          </div>
        </div>
      );
    }

    // ==================== QUIZ MODE ====================
    function QuizMode({ onBack }) {
      const [qIdx, setQIdx] = useState(0);
      const [selected, setSelected] = useState(null);
      const [showResult, setShowResult] = useState(false);
      const [score, setScore] = useState(0);
      const [streak, setStreak] = useState(0);
      const [bestStreak, setBestStreak] = useState(0);
      const [results, setResults] = useState([]);
      const [done, setDone] = useState(false);

      const questions = useMemo(() => {
        const qs = [];
        const shuffled = [...instruments].sort(() => Math.random() - 0.5);
        shuffled.forEach(inst => {
          const type = Math.random();
          if (type < 0.35) {
            qs.push({
              type: "identify",
              prompt: `Which instrument matches this description?`,
              context: inst.desc,
              answer: inst.name,
              options: getOptions(inst, 4),
              instrument: inst
            });
          } else if (type < 0.65) {
            qs.push({
              type: "use",
              prompt: "Which instrument would you use for this?",
              context: inst.use,
              answer: inst.name,
              options: getOptions(inst, 4),
              instrument: inst
            });
          } else {
            qs.push({
              type: "grip",
              prompt: "Which instrument is held this way?",
              context: inst.grip,
              answer: inst.name,
              options: getOptions(inst, 4),
              instrument: inst
            });
          }
        });
        return qs.slice(0, 10);
      }, []);

      function getOptions(correct, count) {
        const others = instruments.filter(i => i.name !== correct.name).sort(() => Math.random() - 0.5).slice(0, count - 1);
        const opts = [...others.map(i => i.name), correct.name].sort(() => Math.random() - 0.5);
        return opts;
      }

      const q = questions[qIdx];
      const handleSelect = (opt) => {
        if (showResult) return;
        setSelected(opt);
        setShowResult(true);
        const correct = opt === q.answer;
        const newResults = [...results, { ...q, userAnswer: opt, correct }];
        setResults(newResults);
        if (correct) {
          setScore(s => s + 10);
          const ns = streak + 1;
          setStreak(ns);
          if (ns > bestStreak) setBestStreak(ns);
        } else {
          setStreak(0);
        }
      };

      const handleNext = () => {
        if (qIdx >= questions.length - 1) {
          setDone(true);
        } else {
          setQIdx(qIdx + 1);
          setSelected(null);
          setShowResult(false);
        }
      };

      if (done) {
        const pct = Math.round((score / (questions.length * 10)) * 100);
        return (
          <div className="fade-in">
            <div style={{
              background: WHITE, borderRadius: CARD_R, padding: 28, textAlign: "center",
              boxShadow: "0 4px 20px rgba(0,0,0,0.08)", marginBottom: 16
            }}>
              <div style={{ fontSize: 48, marginBottom: 8 }}>
                {pct >= 90 ? "\u{1F3C6}" : pct >= 70 ? "\u{1F31F}" : pct >= 50 ? "\u{1F44D}" : "\u{1F4AA}"}
              </div>
              <div style={{ fontSize: 44, fontWeight: 800, color: pct >= 70 ? GREEN : pct >= 50 ? GOLD : RED, lineHeight: 1 }}>{pct}%</div>
              <div style={{ fontSize: 15, fontWeight: 700, color: NAVY, margin: "8px 0" }}>
                {pct >= 90 ? "Attending Level" : pct >= 70 ? "Resident Level" : pct >= 50 ? "Intern Level" : "Keep Studying"}
              </div>
              <div style={{ fontSize: 13, color: MED }}>
                {score} points | Best streak: {bestStreak} {bestStreak >= 3 ? "\u{1F525}" : ""}
              </div>
            </div>

            <div style={{ background: WHITE, borderRadius: CARD_R, padding: 20, boxShadow: SHADOW, marginBottom: 16 }}>
              <div style={{ fontSize: 14, fontWeight: 700, color: NAVY, marginBottom: 14 }}>Review</div>
              {results.map((r, i) => (
                <div key={i} style={{
                  padding: "10px 12px", marginBottom: 6, borderRadius: 10,
                  background: r.correct ? "#F0FBF5" : "#FFF5F5",
                  borderLeft: `4px solid ${r.correct ? GREEN : RED}`,
                  display: "flex", justifyContent: "space-between", alignItems: "center"
                }}>
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 700, color: DARK }}>{r.answer}</div>
                    <div style={{ fontSize: 11, color: MED }}>
                      {r.correct ? "Correct" : `You said: ${r.userAnswer}`}
                    </div>
                  </div>
                  <span style={{ fontSize: 18 }}>{r.correct ? "\u2705" : "\u274C"}</span>
                </div>
              ))}
            </div>

            <div style={{ display: "flex", gap: 10 }}>
              <Btn primary onClick={() => { setQIdx(0); setSelected(null); setShowResult(false); setScore(0); setStreak(0); setBestStreak(0); setResults([]); setDone(false); }} style={{ flex: 1 }}>Try Again</Btn>
              <Btn onClick={onBack} style={{ flex: 1 }}>Back to Menu</Btn>
            </div>
          </div>
        );
      }

      return (
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, padding: "10px 14px", background: WHITE, borderRadius: CARD_R, boxShadow: SHADOW }}>
            <div style={{ display: "flex", gap: 16, alignItems: "center" }}>
              <div>
                <div style={{ fontSize: 10, color: MED, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1 }}>Score</div>
                <div style={{ fontSize: 18, fontWeight: 800, color: TEAL }}>{score}</div>
              </div>
              <div style={{ width: 1, height: 28, background: "#E0E0E0" }} />
              <div>
                <div style={{ fontSize: 10, color: MED, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1 }}>Streak</div>
                <div style={{ fontSize: 18, fontWeight: 800, color: streak >= 3 ? GOLD : streak > 0 ? GREEN : MED }}>
                  {streak > 0 ? `${streak} \u{1F525}` : "0"}
                </div>
              </div>
            </div>
            <div style={{ fontSize: 13, fontWeight: 700, color: MED }}>{qIdx + 1}/{questions.length}</div>
          </div>

          <div style={{ height: 6, background: "#E8EDF2", borderRadius: 3, marginBottom: 16, overflow: "hidden" }}>
            <div style={{ height: "100%", background: `linear-gradient(90deg, ${TEAL}, ${TEAL_DARK})`, width: `${((qIdx + 1) / questions.length) * 100}%`, transition: "width 0.4s", borderRadius: 3 }} />
          </div>

          <div className="slide-up" key={qIdx} style={{ background: WHITE, borderRadius: CARD_R, padding: 20, boxShadow: "0 4px 20px rgba(0,0,0,0.08)", marginBottom: 16 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
              <span style={{ fontSize: 10, fontWeight: 700, color: WHITE, background: NAVY, padding: "3px 10px", borderRadius: 8, textTransform: "uppercase", letterSpacing: 1 }}>
                {q.type === "identify" ? "Identify" : q.type === "use" ? "Clinical Use" : "Technique"}
              </span>
            </div>

            <p style={{ fontSize: 15, fontWeight: 700, color: NAVY, marginBottom: 10, lineHeight: 1.4 }}>{q.prompt}</p>

            <div style={{
              background: "#F8F9FA", borderRadius: 10, padding: "14px 16px", marginBottom: 18,
              borderLeft: `4px solid ${TEAL}`, fontSize: 14, color: DARK, lineHeight: 1.65
            }}>
              {q.context}
            </div>

            <div style={{ display: "grid", gap: 10 }}>
              {q.options.map(opt => {
                const inst = instruments.find(i => i.name === opt);
                const isCorrect = opt === q.answer;
                const isSelected = opt === selected;
                let bg = WHITE;
                let border = "#E0E8EE";
                if (showResult && isCorrect) { bg = "#F0FBF5"; border = GREEN; }
                else if (showResult && isSelected && !isCorrect) { bg = "#FFF5F5"; border = RED; }
                else if (isSelected) { bg = `${TEAL}10`; border = TEAL; }

                return (
                  <button key={opt} onClick={() => handleSelect(opt)}
                    className={showResult && isSelected && !isCorrect ? "shake" : showResult && isCorrect ? "correct-flash" : ""}
                    style={{
                      display: "flex", alignItems: "center", gap: 14, padding: "14px 16px",
                      background: bg, border: `2px solid ${border}`, borderRadius: 12,
                      cursor: showResult ? "default" : "pointer", transition: "all 0.2s",
                      textAlign: "left", fontFamily: "inherit"
                    }}>
                    <div style={{
                      width: 42, height: 42, borderRadius: "50%",
                      background: `${CAT[inst.category].color}10`,
                      border: `2px solid ${CAT[inst.category].color}30`,
                      display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0
                    }}>
                      <InstrumentIcon svg={inst.svg} size={28} color={CAT[inst.category].color} />
                    </div>
                    <div>
                      <div style={{ fontSize: 14, fontWeight: 700, color: NAVY }}>{opt}</div>
                      <div style={{ fontSize: 11, color: MED }}>{inst.category}</div>
                    </div>
                    {showResult && isCorrect && <span style={{ marginLeft: "auto", fontSize: 18 }}>{"\u2705"}</span>}
                    {showResult && isSelected && !isCorrect && <span style={{ marginLeft: "auto", fontSize: 18 }}>{"\u274C"}</span>}
                  </button>
                );
              })}
            </div>
          </div>

          {showResult && (
            <div className="fade-in">
              <div style={{
                background: "#FFF9E6", borderRadius: CARD_R, padding: "12px 16px", marginBottom: 14,
                borderLeft: `4px solid ${GOLD}`
              }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: "#8B6914", textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 4 }}>{"\u{1F48E}"} Surgeon's Tip</div>
                <p style={{ fontSize: 13, color: DARK, margin: 0, lineHeight: 1.6, fontStyle: "italic" }}>{q.instrument.tip}</p>
              </div>
              <Btn primary onClick={handleNext} style={{ width: "100%" }}>
                {qIdx < questions.length - 1 ? "Next Question \u2192" : "View Results"}
              </Btn>
            </div>
          )}
        </div>
      );
    }

    // ==================== SPEED ROUND ====================
    function SpeedRound({ onBack }) {
      const [phase, setPhase] = useState("ready");
      const [timeLeft, setTimeLeft] = useState(60);
      const [score, setScore] = useState(0);
      const [streak, setStreak] = useState(0);
      const [bestStreak, setBestStreak] = useState(0);
      const [hits, setHits] = useState(0);
      const [misses, setMisses] = useState(0);
      const [current, setCurrent] = useState(null);
      const [options, setOptions] = useState([]);
      const [flash, setFlash] = useState(null);
      const timer = useRef(null);

      const nextQuestion = useCallback(() => {
        const inst = instruments[Math.floor(Math.random() * instruments.length)];
        const others = instruments.filter(i => i.name !== inst.name).sort(() => Math.random() - 0.5).slice(0, 3);
        const opts = [...others, inst].sort(() => Math.random() - 0.5);
        setCurrent(inst);
        setOptions(opts);
      }, []);

      const start = () => {
        setPhase("play");
        setTimeLeft(60);
        setScore(0); setStreak(0); setBestStreak(0); setHits(0); setMisses(0);
        nextQuestion();
        timer.current = setInterval(() => {
          setTimeLeft(t => {
            if (t <= 1) {
              clearInterval(timer.current);
              setPhase("done");
              return 0;
            }
            return t - 1;
          });
        }, 1000);
      };

      useEffect(() => () => clearInterval(timer.current), []);

      const handleAnswer = (inst) => {
        if (!current) return;
        const correct = inst.name === current.name;
        if (correct) {
          const mult = streak >= 4 ? 3 : streak >= 2 ? 2 : 1;
          setScore(s => s + (10 * mult));
          setHits(h => h + 1);
          const ns = streak + 1;
          setStreak(ns);
          if (ns > bestStreak) setBestStreak(ns);
          setFlash("correct");
        } else {
          setMisses(m => m + 1);
          setStreak(0);
          setFlash("wrong");
        }
        setTimeout(() => setFlash(null), 300);
        nextQuestion();
      };

      if (phase === "ready") {
        return (
          <div className="fade-in" style={{ textAlign: "center" }}>
            <div style={{ background: WHITE, borderRadius: CARD_R, padding: 32, boxShadow: "0 4px 20px rgba(0,0,0,0.08)", marginBottom: 16 }}>
              <div style={{ fontSize: 48, marginBottom: 12 }}>{"\u26A1"}</div>
              <h2 style={{ fontSize: 22, fontWeight: 800, color: NAVY, marginBottom: 12 }}>Speed Round</h2>
              <p style={{ fontSize: 14, color: MED, lineHeight: 1.6, marginBottom: 20, maxWidth: 380, margin: "0 auto 20px" }}>
                60 seconds. Identify as many instruments as you can. Streak multipliers at 3x and 5x correct. Go.
              </p>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, maxWidth: 300, margin: "0 auto 20px" }}>
                <div style={{ background: "#E8F8F1", borderRadius: 10, padding: "10px 12px", fontSize: 12, fontWeight: 600, color: DARK }}>
                  {"\u2705"} +10 base pts
                </div>
                <div style={{ background: "#FFF9E6", borderRadius: 10, padding: "10px 12px", fontSize: 12, fontWeight: 600, color: DARK }}>
                  {"\u{1F525}"} 2x at 3 streak
                </div>
                <div style={{ background: "#FFF0EE", borderRadius: 10, padding: "10px 12px", fontSize: 12, fontWeight: 600, color: DARK }}>
                  {"\u{1F4A5}"} 3x at 5 streak
                </div>
                <div style={{ background: "#EBF5FB", borderRadius: 10, padding: "10px 12px", fontSize: 12, fontWeight: 600, color: DARK }}>
                  {"\u23F1"} 60 seconds
                </div>
              </div>
              <Btn primary onClick={start} style={{ padding: "14px 48px", fontSize: 16 }}>Start {"\u2192"}</Btn>
            </div>
          </div>
        );
      }

      if (phase === "done") {
        const accuracy = hits + misses > 0 ? Math.round((hits / (hits + misses)) * 100) : 0;
        return (
          <div className="fade-in" style={{ textAlign: "center" }}>
            <div style={{
              background: WHITE, borderRadius: CARD_R, padding: 28, boxShadow: "0 4px 20px rgba(0,0,0,0.08)", marginBottom: 16
            }}>
              <div style={{ fontSize: 48, marginBottom: 8 }}>{"\u26A1"}</div>
              <div style={{ fontSize: 44, fontWeight: 800, color: TEAL, lineHeight: 1 }}>{score}</div>
              <div style={{ fontSize: 15, fontWeight: 700, color: NAVY, margin: "8px 0" }}>Points in 60 Seconds</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginTop: 16 }}>
                <div style={{ background: "#F0F4F8", borderRadius: 10, padding: 10 }}>
                  <div style={{ fontSize: 10, color: MED, fontWeight: 600 }}>Accuracy</div>
                  <div style={{ fontSize: 18, fontWeight: 800, color: accuracy >= 80 ? GREEN : GOLD }}>{accuracy}%</div>
                </div>
                <div style={{ background: "#F0F4F8", borderRadius: 10, padding: 10 }}>
                  <div style={{ fontSize: 10, color: MED, fontWeight: 600 }}>Correct</div>
                  <div style={{ fontSize: 18, fontWeight: 800, color: NAVY }}>{hits}</div>
                </div>
                <div style={{ background: "#F0F4F8", borderRadius: 10, padding: 10 }}>
                  <div style={{ fontSize: 10, color: MED, fontWeight: 600 }}>Best Streak</div>
                  <div style={{ fontSize: 18, fontWeight: 800, color: bestStreak >= 3 ? GOLD : NAVY }}>{bestStreak} {bestStreak >= 3 ? "\u{1F525}" : ""}</div>
                </div>
              </div>
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <Btn primary onClick={start} style={{ flex: 1 }}>Again</Btn>
              <Btn onClick={onBack} style={{ flex: 1 }}>Menu</Btn>
            </div>
          </div>
        );
      }

      // PLAY
      const c = CAT[current.category];
      const urgency = timeLeft <= 10;
      return (
        <div>
          {flash && (
            <div style={{
              position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
              background: flash === "correct" ? "rgba(39,174,96,0.08)" : "rgba(192,57,43,0.08)",
              pointerEvents: "none", zIndex: 100, transition: "opacity 0.3s"
            }} />
          )}

          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, padding: "10px 14px", background: WHITE, borderRadius: CARD_R, boxShadow: SHADOW }}>
            <div style={{ display: "flex", gap: 14, alignItems: "center" }}>
              <div>
                <div style={{ fontSize: 10, color: MED, fontWeight: 600, textTransform: "uppercase" }}>Score</div>
                <div style={{ fontSize: 20, fontWeight: 800, color: TEAL }}>{score}</div>
              </div>
              {streak >= 2 && (
                <div style={{
                  background: "linear-gradient(135deg, #FFF9E6, #FFF0D0)", border: `1px solid ${GOLD}`,
                  borderRadius: 8, padding: "4px 10px", fontSize: 12, fontWeight: 800, color: "#8B6914"
                }}>
                  {streak >= 4 ? "3x" : "2x"} {"\u{1F525}"}
                </div>
              )}
            </div>
            <div className={urgency ? "timer-pulse" : ""} style={{
              fontSize: 22, fontWeight: 800, color: urgency ? RED : NAVY,
              background: urgency ? "#FFF5F5" : "#F0F4F8", padding: "6px 16px", borderRadius: 10,
              border: urgency ? `2px solid ${RED}` : "2px solid transparent"
            }}>
              {timeLeft}s
            </div>
          </div>

          <div className="slide-up" key={current.name + score} style={{
            background: WHITE, borderRadius: CARD_R, padding: 20,
            boxShadow: "0 4px 20px rgba(0,0,0,0.08)", marginBottom: 14, textAlign: "center"
          }}>
            <InstrumentIcon svg={current.svg} size={72} color={c.color} />
            <div style={{ fontSize: 13, fontWeight: 700, color: NAVY, marginTop: 10 }}>{current.desc.split('.')[0]}.</div>
            <CatBadge category={current.category} size="sm" />
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            {options.map(inst => (
              <button key={inst.name} onClick={() => handleAnswer(inst)}
                style={{
                  background: WHITE, border: "2px solid #E0E8EE", borderRadius: 12,
                  padding: "14px 12px", cursor: "pointer", transition: "all 0.15s",
                  textAlign: "center", fontFamily: "inherit"
                }}
                onMouseOver={e => { e.currentTarget.style.borderColor = TEAL; e.currentTarget.style.transform = "translateY(-2px)"; }}
                onMouseOut={e => { e.currentTarget.style.borderColor = "#E0E8EE"; e.currentTarget.style.transform = "none"; }}>
                <div style={{ fontSize: 14, fontWeight: 700, color: NAVY }}>{inst.name}</div>
              </button>
            ))}
          </div>
        </div>
      );
    }

    // ==================== MAIN APP ====================
    function InstrumentIDGame() {
      const [screen, setScreen] = useState("welcome");

      if (screen === "welcome") {
        return (
          <div style={{ fontFamily: "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif", minHeight: "100vh", display: "flex", flexDirection: "column" }}>
            <AppHeader />
            <div className="fade-in" style={{ maxWidth: 700, margin: "0 auto", padding: "0 16px 24px", flex: 1 }}>
              <div style={{ textAlign: "center", padding: "28px 16px 20px" }}>
                <div style={{ fontSize: 48, marginBottom: 8 }}>{"\u{1FA7A}"}</div>
                <h1 style={{ fontSize: 26, fontWeight: 800, color: NAVY, margin: "0 0 8px" }}>Surgical Instrument ID</h1>
                <p style={{ fontSize: 14, color: MED, lineHeight: 1.6, maxWidth: 420, margin: "0 auto" }}>
                  Learn to identify 12 critical surgical instruments. Study their names, uses, and proper technique, then test your knowledge.
                </p>
              </div>

              <div style={{ display: "grid", gap: 12, marginBottom: 20 }}>
                {[
                  { key: "study", icon: "\u{1F4D6}", title: "Study Cards", desc: "Browse all 12 instruments with detailed descriptions, clinical uses, and grip techniques. Filter by category.", color: TEAL },
                  { key: "quiz", icon: "\u{1F3AF}", title: "Knowledge Quiz", desc: "10 questions testing identification, clinical use, and technique. Earn points and build streaks.", color: GOLD },
                  { key: "speed", icon: "\u26A1", title: "Speed Round", desc: "60-second timed sprint. Identify instruments as fast as you can. Streak multipliers reward accuracy.", color: "#C0392B" },
                ].map(mode => (
                  <div key={mode.key} onClick={() => setScreen(mode.key)}
                    style={{
                      background: WHITE, borderRadius: CARD_R, padding: "18px 20px",
                      boxShadow: SHADOW, border: "2px solid #E0E8EE",
                      cursor: "pointer", transition: "all 0.25s",
                      display: "flex", alignItems: "center", gap: 16
                    }}
                    onMouseOver={e => { e.currentTarget.style.borderColor = mode.color; e.currentTarget.style.transform = "translateY(-2px)"; e.currentTarget.style.boxShadow = `0 6px 20px ${mode.color}20`; }}
                    onMouseOut={e => { e.currentTarget.style.borderColor = "#E0E8EE"; e.currentTarget.style.transform = "none"; e.currentTarget.style.boxShadow = SHADOW; }}>
                    <div style={{
                      width: 52, height: 52, borderRadius: 14,
                      background: `${mode.color}12`, border: `2px solid ${mode.color}25`,
                      display: "flex", alignItems: "center", justifyContent: "center",
                      fontSize: 26, flexShrink: 0
                    }}>{mode.icon}</div>
                    <div>
                      <div style={{ fontSize: 16, fontWeight: 800, color: NAVY, marginBottom: 4 }}>{mode.title}</div>
                      <p style={{ fontSize: 12, color: MED, margin: 0, lineHeight: 1.5 }}>{mode.desc}</p>
                    </div>
                  </div>
                ))}
              </div>

              <div style={{
                background: "#FFF9E6", border: `2px solid ${GOLD}`, borderRadius: CARD_R,
                padding: 14, textAlign: "center"
              }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: NAVY, marginBottom: 4 }}>{"\u{1F4A1}"} Start with Study Cards</div>
                <p style={{ fontSize: 12, color: MED, margin: 0, lineHeight: 1.5 }}>
                  Learn the instruments first, then test yourself in the Quiz. Use the Speed Round when you feel confident.
                </p>
              </div>
            </div>
            <AppFooter />
          </div>
        );
      }

      return (
        <div style={{ fontFamily: "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif", minHeight: "100vh", display: "flex", flexDirection: "column" }}>
          <AppHeader subtitle={screen === "study" ? "Study Cards" : screen === "quiz" ? "Knowledge Quiz" : "Speed Round"} />
          <div style={{ maxWidth: 700, margin: "0 auto", padding: "16px 16px 24px", flex: 1 }}>
            <div style={{ marginBottom: 14 }}>
              <button onClick={() => setScreen("welcome")} style={{
                background: "none", border: `2px solid ${TEAL}`, color: TEAL,
                borderRadius: 10, padding: "8px 16px", fontSize: 13, fontWeight: 700,
                cursor: "pointer", fontFamily: "inherit", transition: "all 0.2s"
              }}>{"\u2190"} Menu</button>
            </div>
            {screen === "study" && <StudyMode onBack={() => setScreen("welcome")} />}
            {screen === "quiz" && <QuizMode onBack={() => setScreen("welcome")} />}
            {screen === "speed" && <SpeedRound onBack={() => setScreen("welcome")} />}
          </div>
          <AppFooter />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<InstrumentIDGame />);
  </script>
</body>
</html>
